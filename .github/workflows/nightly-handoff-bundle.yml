name: nightly handoff bundle

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-handoff-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-slices:
    name: nightly handoff bundle ${{ matrix.mode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - mode: pilot
            case_keys: |
              completed-phase/positive
              empty-phase/mutation
              query-registry-drift/positive
              summary-missing-return/mutation
              resume-recent-noise/mutation
              placeholder-conventions/mutation
              bridge-vs-cli/mutation
          - mode: full
            case_keys: |
              completed-phase/positive
              plan-only/positive
              plan-only/mutation
              empty-phase/positive
              empty-phase/mutation
              query-registry-drift/positive
              context-indexing/positive
              bridge-vs-cli/positive
              bridge-vs-cli/mutation
              summary-missing-return/positive
              summary-missing-return/mutation
              mutation-ordering/positive
              mutation-ordering/mutation
              resume-handoff/positive
              resume-handoff/mutation
              resume-recent-noise/positive
              resume-recent-noise/mutation
              config-readback/positive
              placeholder-conventions/positive
              placeholder-conventions/mutation
    env:
      PHASE17_NIGHTLY_MODE: ${{ matrix.mode }}
      PHASE17_NIGHTLY_CASE_KEYS: ${{ matrix.case_keys }}
      PHASE17_THRESHOLD_FILE: benchmarks/phase17_thresholds.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate nightly registry slice
        run: |
          uv run python - <<'PY'
          from os import environ

          from tests.phase16_projection_oracle_helpers import phase16_case_keys

          pilot_case_keys = (
              "completed-phase/positive",
              "empty-phase/mutation",
              "query-registry-drift/positive",
              "summary-missing-return/mutation",
              "resume-recent-noise/mutation",
              "placeholder-conventions/mutation",
              "bridge-vs-cli/mutation",
          )
          mode = environ["PHASE17_NIGHTLY_MODE"]
          case_keys = tuple(line for line in environ["PHASE17_NIGHTLY_CASE_KEYS"].splitlines() if line)
          full_case_keys = phase16_case_keys()
          expected_case_keys = pilot_case_keys if mode == "pilot" else full_case_keys

          if case_keys != expected_case_keys:
              raise SystemExit(
                  f"unexpected {mode} registry slice: expected {len(expected_case_keys)} keys, got {len(case_keys)}"
              )

          print(f"validated {mode} nightly registry slice with {len(case_keys)} fixtures")
          PY

      - name: Run explicit nightly benchmark modules
        run: |
          uv run pytest -q -n 0 \
            benchmarks/test_resume_recent.py \
            benchmarks/test_query_index_freshness.py \
            benchmarks/test_phase_projection_latency.py \
            benchmarks/test_checkpoint_batch.py
