name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  human-authors:
    name: human authors
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit attribution uses human authors
        run: |
          bash scripts/check-human-authors.sh --range "origin/${{ github.base_ref }}..HEAD"

  ruff:
    name: ruff check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Smoke repo graph sync with PATH python
        run: python scripts/sync_repo_graph_contract.py

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check .

  pytest:
    name: pytest ${{ matrix.display_name }} (3.11)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: root 1/9
            category: root
            shard_index: 1
            shard_total: 9
          - display_name: root 2/9
            category: root
            shard_index: 2
            shard_total: 9
          - display_name: root 3/9
            category: root
            shard_index: 3
            shard_total: 9
          - display_name: root 4/9
            category: root
            shard_index: 4
            shard_total: 9
          - display_name: root 5/9
            category: root
            shard_index: 5
            shard_total: 9
          - display_name: root 6/9
            category: root
            shard_index: 6
            shard_total: 9
          - display_name: root 7/9
            category: root
            shard_index: 7
            shard_total: 9
          - display_name: root 8/9
            category: root
            shard_index: 8
            shard_total: 9
          - display_name: root 9/9
            category: root
            shard_index: 9
            shard_total: 9
          - display_name: adapters 1/2
            category: adapters
            shard_index: 1
            shard_total: 2
          - display_name: adapters 2/2
            category: adapters
            shard_index: 2
            shard_total: 2
          - display_name: hooks 1/2
            category: hooks
            shard_index: 1
            shard_total: 2
          - display_name: hooks 2/2
            category: hooks
            shard_index: 2
            shard_total: 2
          - display_name: mcp
            category: mcp
            shard_index: 1
            shard_total: 1
          - display_name: core 1/5
            category: core
            shard_index: 1
            shard_total: 5
          - display_name: core 2/5
            category: core
            shard_index: 2
            shard_total: 5
          - display_name: core 3/5
            category: core
            shard_index: 3
            shard_total: 5
          - display_name: core 4/5
            category: core
            shard_index: 4
            shard_total: 5
          - display_name: core 5/5
            category: core
            shard_index: 5
            shard_total: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Resolve pytest shard targets
        env:
          PYTEST_CATEGORY: ${{ matrix.category }}
          PYTEST_SHARD_INDEX: ${{ matrix.shard_index }}
          PYTEST_SHARD_TARGET_FILE: ${{ runner.temp }}/pytest-targets.txt
          PYTEST_SHARD_TOTAL: ${{ matrix.shard_total }}
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path

          from tests.ci_sharding import write_ci_shard_targets_file

          targets = write_ci_shard_targets_file(
              target_file=Path(os.environ["PYTEST_SHARD_TARGET_FILE"]),
              category=os.environ["PYTEST_CATEGORY"],
              shard_index=int(os.environ["PYTEST_SHARD_INDEX"]),
              shard_total=int(os.environ["PYTEST_SHARD_TOTAL"]),
          )
          print(
              f"Resolved {len(targets)} pytest targets for {os.environ['PYTEST_CATEGORY']} "
              f"shard {os.environ['PYTEST_SHARD_INDEX']}/{os.environ['PYTEST_SHARD_TOTAL']}"
          )
          PY

      - name: Run pytest shard
        env:
          PYTEST_SHARD_TARGET_FILE: ${{ runner.temp }}/pytest-targets.txt
        run: |
          mapfile -t PYTEST_TARGETS < "$PYTEST_SHARD_TARGET_FILE"
          uv run pytest -q "${PYTEST_TARGETS[@]}"

  # Staging rebuild trigger moved to staging-rebuild.yml so it doesn't
  # show as a skipped check on PRs.
