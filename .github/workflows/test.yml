name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  human-authors:
    name: human authors
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit attribution uses human authors
        run: |
          bash scripts/check-human-authors.sh --range "origin/${{ github.base_ref }}..HEAD"

  ruff:
    name: ruff check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Smoke repo graph sync with PATH python
        run: python scripts/sync_repo_graph_contract.py

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check .

  pytest-fast:
    name: pytest fast (3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run fast test suite
        run: uv run pytest tests/ -q

  pytest-heavy:
    name: pytest heavy (3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run complementary heavy suite
        run: |
          HEAVY_SUITE_IGNORE_ARGS="$(uv run python - <<'PY'
          from tests.conftest import complementary_heavy_suite_ignore_args

          print(" ".join(complementary_heavy_suite_ignore_args()))
          PY
          )"
          uv run pytest tests/ -q --full-suite $HEAVY_SUITE_IGNORE_ARGS

  # ── Trigger GPD Web staging rebuild on push to main ──
  trigger-staging-rebuild:
    name: trigger GPD Web staging rebuild
    needs: [pytest-fast, pytest-heavy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild to gpd-web
        env:
          GPD_WEB_TOKEN: ${{ secrets.GPD_WEB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GPD_WEB_TOKEN" ]; then
            echo "::warning::GPD_WEB_DISPATCH_TOKEN not configured — skipping staging rebuild trigger"
            exit 0
          fi
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GPD_WEB_TOKEN}" \
            https://api.github.com/repos/physicalsuperintelligence/gpd-web/dispatches \
            -d '{"event_type":"rebuild-gpd","client_payload":{"source":"github","version":"main","image_tag":"staging"}}'
          echo "Dispatched staging rebuild to gpd-web"
