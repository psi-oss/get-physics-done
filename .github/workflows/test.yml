name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  human-authors:
    name: human authors
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit attribution uses human authors
        run: |
          bash scripts/check-human-authors.sh --range "origin/${{ github.base_ref }}..HEAD"

  ruff:
    name: ruff check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check repo graph generated artifacts
        run: python scripts/sync_repo_graph_contract.py --check

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run ruff check
        run: uv run ruff check .

  python-compatibility:
    name: python compatibility (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Import package surfaces
        run: |
          uv run python - <<'PY'
          import importlib

          modules = [
              "gpd",
              "gpd.cli",
              "gpd.runtime_cli",
              "gpd.adapters.runtime_catalog",
              "gpd.core.artifact_text",
              "gpd.mcp.paper.compiler",
              "gpd.mcp.servers.arxiv_bridge",
          ]
          for module in modules:
              importlib.import_module(module)
          print(f"Imported {len(modules)} package surfaces")
          PY

      - name: Smoke console script
        run: |
          uv run gpd --version
          uv run gpd --help > /tmp/gpd-help.txt
          test -s /tmp/gpd-help.txt

      - name: Run installer and runtime compatibility tests
        run: |
          uv run pytest -q \
            tests/test_metadata_consistency.py::test_python_floor_is_consistent_across_install_surfaces \
            tests/test_runtime_catalog_bootstrap_contract.py \
            tests/test_runtime_install_smoke.py \
            tests/test_install_lifecycle.py::test_markdown_command_runtime_lifecycle_round_trip \
            tests/test_bootstrap_installer.py::test_bootstrap_prefers_versioned_python_when_generic_alias_is_newer \
            tests/test_bootstrap_installer.py::test_bootstrap_recreates_managed_env_when_selected_minor_changes

      - name: Build wheel
        run: uv build --wheel --out-dir dist/compat-${{ matrix.python-version }}

  pytest:
    name: pytest ${{ matrix.display_name }} (3.11)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: root 1/9
            category: root
            shard_index: 1
            shard_total: 9
          - display_name: root 2/9
            category: root
            shard_index: 2
            shard_total: 9
          - display_name: root 3/9
            category: root
            shard_index: 3
            shard_total: 9
          - display_name: root 4/9
            category: root
            shard_index: 4
            shard_total: 9
          - display_name: root 5/9
            category: root
            shard_index: 5
            shard_total: 9
          - display_name: root 6/9
            category: root
            shard_index: 6
            shard_total: 9
          - display_name: root 7/9
            category: root
            shard_index: 7
            shard_total: 9
          - display_name: root 8/9
            category: root
            shard_index: 8
            shard_total: 9
          - display_name: root 9/9
            category: root
            shard_index: 9
            shard_total: 9
          - display_name: adapters 1/2
            category: adapters
            shard_index: 1
            shard_total: 2
          - display_name: adapters 2/2
            category: adapters
            shard_index: 2
            shard_total: 2
          - display_name: hooks 1/2
            category: hooks
            shard_index: 1
            shard_total: 2
          - display_name: hooks 2/2
            category: hooks
            shard_index: 2
            shard_total: 2
          - display_name: mcp 1/2
            category: mcp
            shard_index: 1
            shard_total: 2
          - display_name: mcp 2/2
            category: mcp
            shard_index: 2
            shard_total: 2
          - display_name: core 1/5
            category: core
            shard_index: 1
            shard_total: 5
          - display_name: core 2/5
            category: core
            shard_index: 2
            shard_total: 5
          - display_name: core 3/5
            category: core
            shard_index: 3
            shard_total: 5
          - display_name: core 4/5
            category: core
            shard_index: 4
            shard_total: 5
          - display_name: core 5/5
            category: core
            shard_index: 5
            shard_total: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Resolve pytest shard targets
        timeout-minutes: 3
        env:
          PYTEST_CATEGORY: ${{ matrix.category }}
          PYTEST_SHARD_INDEX: ${{ matrix.shard_index }}
          PYTEST_SHARD_TARGET_FILE: ${{ runner.temp }}/pytest-targets.txt
          PYTEST_SHARD_TOTAL: ${{ matrix.shard_total }}
        run: |
          uv run python - <<'PY'
          import os
          import time
          from pathlib import Path

          from tests.ci_sharding import write_ci_shard_targets_file

          started_at = time.perf_counter()
          targets = write_ci_shard_targets_file(
              target_file=Path(os.environ["PYTEST_SHARD_TARGET_FILE"]),
              category=os.environ["PYTEST_CATEGORY"],
              shard_index=int(os.environ["PYTEST_SHARD_INDEX"]),
              shard_total=int(os.environ["PYTEST_SHARD_TOTAL"]),
          )
          elapsed_seconds = time.perf_counter() - started_at
          print(
              f"Resolved {len(targets)} pytest targets for {os.environ['PYTEST_CATEGORY']} "
              f"shard {os.environ['PYTEST_SHARD_INDEX']}/{os.environ['PYTEST_SHARD_TOTAL']} "
              f"in {elapsed_seconds:.2f}s"
          )
          PY

      - name: Run pytest shard
        timeout-minutes: 10
        env:
          GPD_FAST_SUITE_BUDGET_SECONDS: "180"
          PYTEST_SHARD_TARGET_FILE: ${{ runner.temp }}/pytest-targets.txt
        run: |
          mapfile -t PYTEST_TARGETS < "$PYTEST_SHARD_TARGET_FILE"
          echo "Fast suite budget: ${GPD_FAST_SUITE_BUDGET_SECONDS}s enforced per pytest shard; job timeout: 10 minutes"
          set +e
          timeout "${GPD_FAST_SUITE_BUDGET_SECONDS}s" uv run pytest -q --durations=20 --durations-min=1.0 "${PYTEST_TARGETS[@]}"
          pytest_status=$?
          set -e
          if [ "$pytest_status" -eq 124 ]; then
            echo "::error::pytest shard exceeded enforced ${GPD_FAST_SUITE_BUDGET_SECONDS}s fast-suite budget"
          fi
          exit "$pytest_status"

  # Staging rebuild trigger moved to staging-rebuild.yml so it doesn't
  # show as a skipped check on PRs.
