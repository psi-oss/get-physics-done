name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  human-authors:
    name: human authors
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit attribution uses human authors
        run: |
          bash scripts/check-human-authors.sh --range "origin/${{ github.base_ref }}..HEAD"

  ruff:
    name: ruff check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Smoke repo graph sync with PATH python
        run: python scripts/sync_repo_graph_contract.py --check

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check .

  smoke:
    name: fast smoke (3.11)
    runs-on: ubuntu-latest
    # Keep this fast release/package lane within the CI fast-priority timeout (3 minutes).
    timeout-minutes: 3

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Smoke npm pack dry run
        env:
          npm_config_audit: "false"
          npm_config_cache: "${{ github.workspace }}/tmp/npm-cache"
          npm_config_fund: "false"
          npm_config_update_notifier: "false"
        run: |
          mkdir -p tmp/npm-cache
          npm pack --dry-run --json > tmp/npm-pack-dry-run.json
      - name: Verify npm pack manifest
        run: python scripts/release_workflow.py verify-npm-pack --input tmp/npm-pack-dry-run.json

      - name: Run release/package smoke tests
        run: uv run pytest -q tests/test_release_consistency.py tests/test_repo_hygiene.py tests/test_schema_registry_ownership_note.py tests/test_runtime_abstraction_boundaries.py::test_runtime_specific_terms_are_confined_to_explicit_boundary_files tests/adapters/test_runtime_catalog.py::test_runtime_catalog_explicit_priority_order tests/adapters/test_runtime_catalog.py::test_runtime_descriptor_resolves_from_adapter_module tests/adapters/test_runtime_catalog.py::test_runtime_catalog_loader_validates_schema_json tests/core/test_contract_validation_fast_regressions.py tests/core/test_contract_schema_prompt_parity.py::test_plan_contract_schema_surfaces_canonical_research_contract_fields tests/core/test_workflow_stage_manifest_inventory.py tests/core/test_workflow_staging.py::test_validate_workflow_stage_manifest_payload_loads_research_phase_manifest tests/core/test_workflow_staging.py::test_validate_workflow_stage_manifest_payload_loads_write_paper_manifest tests/core/test_research_phase_stage_manifest.py::test_research_phase_stage_manifest_defers_runtime_delegation_until_the_handoff_stage tests/core/test_research_phase_stage_manifest.py::test_research_phase_command_prompt_budget_keeps_delegation_authorities_out_of_the_wrapper tests/core/test_write_paper_prompt_budget.py::test_write_paper_command_stays_thin_and_only_eagerly_loads_the_workflow tests/core/test_write_paper_prompt_budget.py::test_write_paper_workflow_defers_stage_authorities_until_the_manifest_stages_need_them

  plan-shards:
    name: plan pytest shards + preflight (3.11)
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate runtime catalog schema
        run: uv run python scripts/validate_runtime_catalog_schema.py

      - name: Plan pytest shards
        env:
          PYTEST_SHARD_PLAN_DIR: ${{ runner.temp }}/pytest-shards
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path

          from tests.ci_sharding import write_ci_shard_plan

          output_dir = Path(os.environ["PYTEST_SHARD_PLAN_DIR"])
          written_files = write_ci_shard_plan(target_dir=output_dir)
          total_targets = 0
          for slug, target_file in written_files.items():
              targets = [line for line in target_file.read_text(encoding="utf-8").splitlines() if line]
              total_targets += len(targets)
              print(f"Wrote {len(targets)} pytest targets for {slug} to {target_file.name}")
          print(f"Planned {len(written_files)} shards with {total_targets} total pytest targets")
          PY

      - name: Upload pytest shard plan
        uses: actions/upload-artifact@v7
        with:
          name: pytest-shard-plan
          path: ${{ runner.temp }}/pytest-shards
          retention-days: 1

  pytest:
    name: pytest ${{ matrix.display_name }} (3.11)
    runs-on: ubuntu-latest
    needs:
      - smoke
      - plan-shards
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: root 1/9
            category: root
            shard_index: 1
            shard_total: 9
            target_filename: root-1.txt
          - display_name: root 2/9
            category: root
            shard_index: 2
            shard_total: 9
            target_filename: root-2.txt
          - display_name: root 3/9
            category: root
            shard_index: 3
            shard_total: 9
            target_filename: root-3.txt
          - display_name: root 4/9
            category: root
            shard_index: 4
            shard_total: 9
            target_filename: root-4.txt
          - display_name: root 5/9
            category: root
            shard_index: 5
            shard_total: 9
            target_filename: root-5.txt
          - display_name: root 6/9
            category: root
            shard_index: 6
            shard_total: 9
            target_filename: root-6.txt
          - display_name: root 7/9
            category: root
            shard_index: 7
            shard_total: 9
            target_filename: root-7.txt
          - display_name: root 8/9
            category: root
            shard_index: 8
            shard_total: 9
            target_filename: root-8.txt
          - display_name: root 9/9
            category: root
            shard_index: 9
            shard_total: 9
            target_filename: root-9.txt
          - display_name: adapters 1/2
            category: adapters
            shard_index: 1
            shard_total: 2
            target_filename: adapters-1.txt
          - display_name: adapters 2/2
            category: adapters
            shard_index: 2
            shard_total: 2
            target_filename: adapters-2.txt
          - display_name: hooks 1/2
            category: hooks
            shard_index: 1
            shard_total: 2
            target_filename: hooks-1.txt
          - display_name: hooks 2/2
            category: hooks
            shard_index: 2
            shard_total: 2
            target_filename: hooks-2.txt
          - display_name: mcp
            category: mcp
            shard_index: 1
            shard_total: 1
            target_filename: mcp.txt
          - display_name: core 1/5
            category: core
            shard_index: 1
            shard_total: 5
            target_filename: core-1.txt
          - display_name: core 2/5
            category: core
            shard_index: 2
            shard_total: 5
            target_filename: core-2.txt
          - display_name: core 3/5
            category: core
            shard_index: 3
            shard_total: 5
            target_filename: core-3.txt
          - display_name: core 4/5
            category: core
            shard_index: 4
            shard_total: 5
            target_filename: core-4.txt
          - display_name: core 5/5
            category: core
            shard_index: 5
            shard_total: 5
            target_filename: core-5.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Download pytest shard plan
        uses: actions/download-artifact@v8
        with:
          name: pytest-shard-plan
          path: ${{ runner.temp }}/pytest-shards

      - name: Run pytest shard
        env:
          PYTEST_SHARD_TARGET_FILE: ${{ runner.temp }}/pytest-shards/${{ matrix.target_filename }}
        run: |
          mapfile -t PYTEST_TARGETS < "$PYTEST_SHARD_TARGET_FILE"
          uv run pytest -q --durations=20 --durations-min=0 "${PYTEST_TARGETS[@]}"

  # Staging rebuild trigger moved to staging-rebuild.yml so it doesn't
  # show as a skipped check on PRs.
