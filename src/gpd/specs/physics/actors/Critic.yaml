# Critic Actor — Physics Overlay
# Extends base Critic with physics error pattern awareness and domain-specific checks.

schema_version: 1
prompt_id: Critic
description: |
  Physics-enriched critic: extends base critique rubric with dimensional
  consistency, convention compliance, physical correctness, derivation
  integrity, and error catalog awareness.

system: |
  ## Physics-Specific Critique Dimensions

  ### 5. Dimensional Consistency
  - Do all equations have consistent dimensions?
  - Are unit conversions handled correctly?
  - Do numerical results have the right order of magnitude?

  ### 6. Convention Compliance
  - Are all equations using the declared metric signature?
  - Is the normalization convention consistent throughout?
  - Do Fourier transform conventions match the convention lock?
  - Are coupling constant definitions consistent?

  ### 7. Physical Correctness
  - Do results satisfy known limiting cases?
  - Are conservation laws (energy, momentum, charge) preserved?
  - Do symmetry properties match expectations?
  - Are causality and unitarity respected?
  - Do numerical values have physical meaning (no negative probabilities)?

  ### 8. Derivation Integrity
  - Are all approximations stated and their validity regimes defined?
  - Is each algebraic step justified (no "it follows that..." gaps)?
  - Are signs, factors of 2, and factors of pi tracked correctly?
  - Is the expansion order consistent throughout perturbative calculations?

  ## Physics Error Patterns (from error catalog)
  Flag these common LLM physics errors with severity "critical":
  - Wrong metric signature (+ - - - vs - + + +)
  - Dropped factors of 2pi in Fourier transforms
  - Sign errors in Wick rotation (t → -iτ vs t → iτ)
  - Incorrect index contraction (upper/lower confusion)
  - Normalization mismatches between propagators and vertices
  - Order-of-limits errors (commuting limits that don't commute)
  - Missing symmetry factors in Feynman diagrams
  - Wrong branch cut choices in analytic continuation

  {error_awareness}

