# PhysicsWork Action — Physics Bundle
# Physics-enriched variant of Work with verification gates.

schema_version: 1
action_id: PhysicsWork
title: Physics Work
summary: |
  Execute concrete physics work with built-in verification gates.
  Extends the base Work action with dimensional analysis, convention
  enforcement, and domain-specific self-checks. Use instead of Work
  for physics-heavy execution steps.

schemas:
  state_fields_touched:
    - /plan/sections
    - /scratch_knowledge
    - /pointers
    - /intermediate_results
    - /active_calculations
    - /open_questions

write_set:
  allowed_write_prefixes:
    - /plan/sections
    - /scratch_knowledge
    - /pointers
    - /intermediate_results
    - /active_calculations
    - /open_questions

write_recipe:
  version: 1
  containers:
    - op: put
      path: /plan/sections
      value_required_keys: [title, status, content, pointers, subsections]
    - op: append
      path: /scratch_knowledge/notes
      value_required_keys: [id, content]
    - op: put
      path: /scratch_knowledge/key_values
    - op: append
      path: /pointers/logs
      value_required_keys: [ptr, kind]
    - op: append
      path: /intermediate_results
      value_required_keys: [id, equation, description, units, validity]
    - op: append
      path: /active_calculations
      value_required_keys: [id, description, status, approach]
    - op: append
      path: /open_questions
      value_required_keys: [id, question, priority, context]

parameters:
  optional:
    - name: focus_blurb
      type: string
      default: ""
      meaning: What physics work to perform and why.
    - name: protocol
      type: string
      meaning: >
        Computation protocol to follow (perturbation_theory, numerical_computation,
        symmetry_analysis, renormalization_group, path_integrals, etc.).
    - name: verification_checks
      type: array
      meaning: >
        Which verification checks to run after completing the work.
        Options: dimensional, limiting_cases, symmetry, conservation,
        numerical, sign_convention, index_consistency.

triage_guidance: |
  Propose PhysicsWork when:
  - The work involves physics calculations, derivations, or numerical computations
  - Domain-specific verification is needed after execution
  - Convention compliance needs enforcement during work
  - The work follows a specific physics protocol

  Use base Work instead when:
  - The task is organizational (plan updates, knowledge cleanup)
  - No physics-specific verification is needed
  - The work is purely about state management

modes:
  derivation:
    title: "PhysicsWork/derivation"
    summary: "Step-by-step analytic derivation with verification"
    triage_guidance: "Propose when the work involves symbolic derivation."
    action_guidance: "Apply derivation protocol with sign/factor/convention checkpoints."
  numerical_experiment:
    title: "PhysicsWork/numerical_experiment"
    summary: "Numerical computation and validation"
    triage_guidance: "Propose when the work involves numerical calculations or simulations."
    action_guidance: "Focus on convergence, error budgets, and numerical stability."
  literature_review:
    title: "PhysicsWork/literature_review"
    summary: "Physics literature analysis and extraction"
    triage_guidance: "Propose when physics literature analysis is needed during work."
    action_guidance: "Extract equations, conventions, and results from literature sources."
  equation_derivation:
    title: "PhysicsWork/equation_derivation"
    summary: "Derive a specific equation from first principles"
    triage_guidance: "Propose when a specific equation needs rigorous derivation."
    action_guidance: "Track every step with dimensional analysis and convention checks."
  convergence_study:
    title: "PhysicsWork/convergence_study"
    summary: "Systematic convergence analysis"
    triage_guidance: "Propose when numerical convergence needs systematic study."
    action_guidance: "Vary parameters, measure convergence rates, identify breakdowns."

action_guidance: |
  ## Execution Protocol
  Follow the base Work protocol, PLUS:

  ### Pre-Execution Checks
  1. Read the convention lock — verify conventions for this calculation
  2. Identify the relevant computation protocol
  3. Check for related NoGo items — avoid documented dead ends
  4. Review relevant Error Class patterns for this type of calculation

  ### During Execution
  - Apply the self-critique checkpoint every 3-4 steps
  - Track dimensions at every intermediate step
  - Use ASSERT_CONVENTION for every convention-dependent step
  - Record intermediate results as Evidence items in /scratch_knowledge
  - Track active calculations in /active_calculations with status updates

  ### Post-Execution Verification Gate
  Run the specified verification_checks (or all by default):
  1. Dimensional analysis: all equations dimensionally consistent
  2. Limiting cases: known limits reproduced correctly
  3. Symmetry: symmetry properties preserved
  4. Conservation: conserved quantities maintained
  5. Numerical: values are order-of-magnitude correct
  6. Sign convention: signs consistent with convention lock
  7. Index consistency: all indices properly contracted

  If any check fails: record as Issue, mark plan node "needs_revision",
  and document the failure for CritiqueImprove to address.

  ### Knowledge Recording (Physics-Enriched)
  For each result, record:
  - The equation/value with explicit units and dimensions
  - The convention context under which it was derived
  - The verification checks that passed/failed
  - The approximation regime and validity conditions

controller:
  bucket: execution
  proposable: true

execution:
  kind: commit
  shape: linear
  actor_id: Researcher
  mcp_tools: true
