# Subfield Convention Defaults — Physics Bundle
# Default convention lock values organized by physics subfield.
# When a project declares a subfield, these conventions are pre-populated.
# Users can override any value in their project convention lock.

# Each subfield provides defaults for the 18 canonical convention fields
# defined in packages/gpd/src/gpd/core/conventions.py.

qft:
  metric_signature: "mostly-minus (+---)"
  index_convention: "Einstein summation (Greek: spacetime 0-3, Latin: spatial 1-3)"
  coordinate_system: "Cartesian (x^0=t, x^1, x^2, x^3)"
  gauge_choice: "Lorenz gauge (partial_mu A^mu = 0)"
  coupling_normalization: "g^2/(4pi) for gauge couplings"
  sign_convention: "e^{-ipx} for positive-energy particles"
  operator_ordering: "normal ordering :...: for free fields"
  natural_units: "hbar = c = 1"
  regularization_scheme: "dimensional regularization (d = 4 - 2*epsilon)"
  renormalization_scheme: "MS-bar"
  boundary_conditions: "vacuum boundary conditions (fields vanish at infinity)"
  integration_measure: "d^dk/(2pi)^d for loop momenta"
  tensor_convention: "abstract index notation; metric g_{mu nu} for lowering"
  symmetry_convention: "Lie algebra [T^a, T^b] = i f^{abc} T^c"
  state_normalization: "<p|q> = (2pi)^3 2E_p delta^3(p-q)"
  phase_convention: "Condon-Shortley phase for angular momentum"
  fourier_convention: "f(x) = int d^dk/(2pi)^d f(k) e^{ikx}"
  perturbation_parameter: "alpha = g^2/(4pi) for loop expansion"

condmat:
  metric_signature: "Euclidean (all positive)"
  index_convention: "Latin spatial indices (i,j,k = 1..d)"
  coordinate_system: "lattice or continuum (specify per calculation)"
  gauge_choice: "Coulomb gauge (div A = 0) or temporal gauge (A_0 = 0)"
  coupling_normalization: "J for exchange, U for Hubbard, t for hopping"
  sign_convention: "e^{-i omega t} for time-dependent fields"
  operator_ordering: "normal ordering relative to Fermi sea"
  natural_units: "hbar = k_B = 1"
  regularization_scheme: "lattice regularization (lattice spacing a)"
  renormalization_scheme: "momentum shell (Wilsonian)"
  boundary_conditions: "periodic or open (specify per problem)"
  integration_measure: "d^dk/(2pi)^d"
  tensor_convention: "Cartesian spatial tensors"
  symmetry_convention: "SU(2) spin: [S^i, S^j] = i epsilon^{ijk} S^k"
  state_normalization: "<k|k'> = delta_{k,k'} (lattice) or (2pi)^d delta^d(k-k') (continuum)"
  phase_convention: "Condon-Shortley for angular momentum"
  fourier_convention: "discrete: f_k = (1/N) sum_r f_r e^{-ikr}"
  perturbation_parameter: "U/t (strong coupling) or t/U (weak coupling), specify"

statmech:
  metric_signature: "Euclidean"
  index_convention: "Latin spatial (i,j,k)"
  coordinate_system: "lattice site indices or continuum as specified"
  gauge_choice: "N/A (or specify if gauge theory)"
  coupling_normalization: "beta = 1/(k_B T) (inverse temperature)"
  sign_convention: "Boltzmann weight e^{-beta H}"
  operator_ordering: "N/A (classical) or specify (quantum)"
  natural_units: "k_B = 1"
  regularization_scheme: "lattice (spacing a) or UV cutoff Lambda"
  renormalization_scheme: "real-space RG or momentum-shell"
  boundary_conditions: "periodic (torus) unless stated otherwise"
  integration_measure: "product measure for partition function"
  tensor_convention: "Cartesian"
  symmetry_convention: "group action on order parameter"
  state_normalization: "Tr(rho) = 1 for density matrix, Z = Tr(e^{-beta H}) for partition function"
  phase_convention: "N/A"
  fourier_convention: "discrete: f_k = (1/N) sum_r f_r e^{-ikr}"
  perturbation_parameter: "beta J (coupling strength) or epsilon = d - d_c (near critical dimension)"

gr-cosmology:
  metric_signature: "mostly-minus (+---) or mostly-plus (-+++), SPECIFY"
  index_convention: "Greek: spacetime (0-3), Latin: spatial (1-3), abstract indices when needed"
  coordinate_system: "specify per problem (Schwarzschild, FRW, harmonic, etc.)"
  gauge_choice: "de Donder/harmonic gauge for perturbations, or specify"
  coupling_normalization: "8pi G = kappa^2 (or 8pi G = 1 in reduced Planck units)"
  sign_convention: "Riemann: R^a_{bcd} = partial_c Gamma^a_{bd} - ... + Gamma Gamma - Gamma Gamma"
  operator_ordering: "N/A (classical GR) or specify (quantum gravity)"
  natural_units: "G = c = 1 (geometrized units) or c = hbar = 1 (natural)"
  regularization_scheme: "specify if quantum corrections are involved"
  renormalization_scheme: "specify if quantum corrections are involved"
  boundary_conditions: "asymptotically flat, AdS, or cosmological (specify)"
  integration_measure: "sqrt(-g) d^4x"
  tensor_convention: "abstract index notation; Christoffel connection, metric-compatible"
  symmetry_convention: "diffeomorphism invariance; Killing vectors for symmetries"
  state_normalization: "N/A (classical)"
  phase_convention: "N/A"
  fourier_convention: "Fourier modes for perturbation theory (specify k convention)"
  perturbation_parameter: "h_{mu nu} for metric perturbations, epsilon for slow-roll"

amo:
  metric_signature: "Euclidean (non-relativistic)"
  index_convention: "Cartesian (i,j,k = x,y,z) or spherical (r, theta, phi)"
  coordinate_system: "spherical harmonics for angular parts, radial functions R(r)"
  gauge_choice: "Coulomb gauge (div A = 0) for EM interactions"
  coupling_normalization: "e^2/(4pi epsilon_0) for Coulomb, or alpha = e^2/(4pi epsilon_0 hbar c)"
  sign_convention: "e^{-i omega t} for positive frequency"
  operator_ordering: "Weyl ordering unless specified"
  natural_units: "atomic units (hbar = m_e = e = 4pi epsilon_0 = 1) or SI"
  regularization_scheme: "N/A (typically finite-dimensional Hilbert spaces)"
  renormalization_scheme: "N/A (or specify for QED corrections)"
  boundary_conditions: "bound states: psi -> 0 at infinity; scattering: plane wave + outgoing"
  integration_measure: "r^2 sin(theta) dr d(theta) d(phi) in spherical"
  tensor_convention: "spherical tensor operators T^k_q"
  symmetry_convention: "SO(3) angular momentum: [J_i, J_j] = i epsilon_{ijk} J_k"
  state_normalization: "<n l m | n' l' m'> = delta_{nn'} delta_{ll'} delta_{mm'}"
  phase_convention: "Condon-Shortley phase"
  fourier_convention: "plane wave: psi_k = e^{ikr} / (2pi)^{3/2}"
  perturbation_parameter: "alpha = e^2/(4pi epsilon_0 hbar c) for QED corrections"

nuclear-particle:
  metric_signature: "mostly-minus (+---)"
  index_convention: "Greek: spacetime, Latin: spatial or flavor/color as context"
  coordinate_system: "Cartesian 4-vectors"
  gauge_choice: "specify per calculation (Feynman, Coulomb, axial, etc.)"
  coupling_normalization: "alpha_s = g_s^2/(4pi) for QCD, G_F for weak"
  sign_convention: "e^{-ipx} for particles"
  operator_ordering: "time-ordered (T-product) for S-matrix elements"
  natural_units: "hbar = c = 1, energies in GeV"
  regularization_scheme: "dimensional regularization (d = 4 - 2*epsilon)"
  renormalization_scheme: "MS-bar"
  boundary_conditions: "in/out scattering states"
  integration_measure: "d^dk/(2pi)^d for loop momenta"
  tensor_convention: "Dirac matrices: {gamma^mu, gamma^nu} = 2 g^{mu nu}"
  symmetry_convention: "SU(3)_c x SU(2)_L x U(1)_Y for SM; specify for BSM"
  state_normalization: "relativistic: <p|p'> = (2pi)^3 2E_p delta^3(p-p')"
  phase_convention: "PDG phase conventions for CKM/PMNS"
  fourier_convention: "f(x) = int d^4k/(2pi)^4 f(k) e^{ikx}"
  perturbation_parameter: "alpha_s for QCD, alpha_em for QED, G_F for weak"

mathematical-physics:
  metric_signature: "specify per problem (Riemannian or pseudo-Riemannian)"
  index_convention: "abstract index notation with explicit range declarations"
  coordinate_system: "local coordinates on manifold; specify charts"
  gauge_choice: "specify if gauge theory is involved"
  coupling_normalization: "specify per problem"
  sign_convention: "specify per problem (multiple conventions in literature)"
  operator_ordering: "specify per problem"
  natural_units: "dimensionless where possible; specify otherwise"
  regularization_scheme: "zeta function or heat kernel"
  renormalization_scheme: "specify per problem"
  boundary_conditions: "specify per problem (Dirichlet, Neumann, mixed, periodic)"
  integration_measure: "specify volume form explicitly"
  tensor_convention: "abstract index notation; specify connection"
  symmetry_convention: "specify Lie algebra conventions with structure constants"
  state_normalization: "specify Hilbert space inner product"
  phase_convention: "specify per problem"
  fourier_convention: "specify per problem"
  perturbation_parameter: "specify per problem"

astrophysics:
  metric_signature: "mostly-minus (+---)"
  index_convention: "Greek: spacetime, Latin: spatial"
  coordinate_system: "specify per problem (Schwarzschild, Kerr, FRW, etc.)"
  gauge_choice: "specify per problem"
  coupling_normalization: "G for gravity, sigma_T for Thomson, etc."
  sign_convention: "e^{-i omega t} for waves"
  operator_ordering: "N/A (classical)"
  natural_units: "CGS or geometrized (G = c = 1), SPECIFY"
  regularization_scheme: "N/A (or specify for quantum corrections)"
  renormalization_scheme: "N/A"
  boundary_conditions: "asymptotically flat or cosmological (specify)"
  integration_measure: "sqrt(-g) d^4x or dV for 3-volume"
  tensor_convention: "standard GR conventions"
  symmetry_convention: "specify isometry group"
  state_normalization: "N/A"
  phase_convention: "N/A"
  fourier_convention: "specify per problem"
  perturbation_parameter: "v/c for post-Newtonian, epsilon for perturbations"
