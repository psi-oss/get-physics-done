# LLM Physics Error Catalog — Deep Domain Errors (61-85)
# Specialized errors in specific physics domains.

schema_version: 1
catalog_id: llm-physics-errors-deep
description: Deep domain-specific LLM physics errors

errors:
  - id: E061
    name: bethe_ansatz_string_error
    category: computational
    severity: major
    description: Wrong string hypothesis or string configuration in Bethe ansatz.
    detection: Verify string solutions satisfy Bethe equations. Check string deviations.

  - id: E062
    name: rmt_symmetry_class_error
    category: convention
    severity: major
    description: Wrong random matrix symmetry class (GUE/GOE/GSE mismatch).
    detection: Check time-reversal and spin-rotation symmetry of the system.

  - id: E063
    name: boltzmann_equation_collision_term
    category: computational
    severity: major
    description: Wrong collision integral in kinetic theory.
    detection: Check detailed balance. Verify H-theorem. Check cross-section factors.

  - id: E064
    name: resummation_double_counting
    category: computational
    severity: critical
    description: Double-counting contributions when combining resummed and fixed-order results.
    detection: Subtract overlap terms explicitly. Check matching conditions.

  - id: E065
    name: conformal_block_error
    category: computational
    severity: major
    description: Wrong conformal block decomposition or crossing symmetry implementation.
    detection: Verify OPE convergence. Check crossing symmetry numerically.

  - id: E066
    name: berry_phase_sign
    category: computational
    severity: major
    description: Wrong sign or value of Berry phase/connection.
    detection: Verify gauge-invariant quantities (Berry curvature, Chern number).

  - id: E067
    name: entanglement_entropy_formula
    category: computational
    severity: major
    description: Wrong entanglement entropy formula (von Neumann vs Renyi vs replica).
    detection: Check which entropy is being computed. Verify replica limit n->1.

  - id: E068
    name: holographic_dictionary_error
    category: conceptual
    severity: major
    description: Wrong AdS/CFT dictionary entry (bulk-boundary correspondence).
    detection: Check mass-dimension relation. Verify boundary conditions (standard vs alternate).

  - id: E069
    name: numerical_instability_undetected
    category: computational
    severity: major
    description: Numerical result corrupted by floating-point instability.
    detection: Run at multiple precisions. Check condition number. Verify with alternative algorithm.

  - id: E070
    name: convergence_not_verified
    category: computational
    severity: major
    description: Numerical result accepted without convergence verification.
    detection: Run at 3+ resolutions. Check Richardson extrapolation. Verify error scaling.

  - id: E071
    name: monte_carlo_thermalization
    category: computational
    severity: major
    description: Monte Carlo measurements taken before thermalization.
    detection: Monitor autocorrelation time. Discard burn-in. Check equilibration.

  - id: E072
    name: discretization_error_uncontrolled
    category: computational
    severity: major
    description: Discretization error not estimated or controlled.
    detection: Run at multiple lattice spacings. Verify continuum extrapolation.

  - id: E073
    name: finite_size_effect_ignored
    category: computational
    severity: major
    description: Finite-size effects not accounted for in numerical results.
    detection: Run at multiple system sizes. Check FSS scaling.

  - id: E074
    name: critical_slowing_down
    category: computational
    severity: major
    description: Ergodicity broken or severely slowed near critical point.
    detection: Monitor autocorrelation time near phase transitions. Use cluster algorithms.

  - id: E075
    name: wrong_symplectic_structure
    category: computational
    severity: critical
    description: Wrong symplectic form or Poisson bracket.
    detection: Verify {q_i, p_j} = delta_{ij}. Check Jacobi identity.

  - id: E076
    name: wkb_connection_formula_error
    category: computational
    severity: major
    description: Wrong WKB connection formula at turning points.
    detection: Check Stokes phenomenon. Verify Airy function matching.

  - id: E077
    name: deformation_quantization_error
    category: computational
    severity: major
    description: Wrong star product or Moyal bracket.
    detection: Verify associativity. Check classical limit.

  - id: E078
    name: dualization_error
    category: computational
    severity: major
    description: Error in duality transformation (electric-magnetic, S-duality, T-duality).
    detection: Verify duality maps charges correctly. Check spectrum invariance.

  - id: E079
    name: anomalous_dimension_calculation
    category: computational
    severity: major
    description: Wrong anomalous dimension from mixing matrix diagonalization.
    detection: Verify eigenvalues of mixing matrix. Check scheme dependence.

  - id: E080
    name: soft_theorem_misapplication
    category: conceptual
    severity: major
    description: Applying soft theorem outside its validity regime.
    detection: Check that the soft momentum is truly soft compared to all other scales.

  - id: E081
    name: recursion_relation_initial_condition
    category: computational
    severity: major
    description: Wrong initial/boundary condition for amplitude recursion.
    detection: Verify 3-point amplitudes. Check factorization on poles.

  - id: E082
    name: superspace_grassmann_error
    category: computational
    severity: major
    description: Wrong Grassmann integration or Berezin integral.
    detection: Verify int d(theta) theta = 1. Check nilpotency.

  - id: E083
    name: moduli_space_singularity
    category: computational
    severity: major
    description: Missing or mishandled singularity in moduli space integration.
    detection: Check for enhanced gauge symmetry points. Verify regularity of integral.

  - id: E084
    name: wrong_spectral_function
    category: computational
    severity: major
    description: Wrong spectral function (Kallen-Lehmann representation violated).
    detection: Check positivity. Verify sum rule. Check analytic structure.

  - id: E085
    name: effective_potential_convexity
    category: conceptual
    severity: major
    description: Confusing convex effective potential with non-convex tree-level potential.
    detection: The full effective potential is always convex (Maxwell construction).
