# LLM Physics Error Catalog — Field Theory & Advanced Errors (86-104)
# Specialized field theory, many-body, and advanced topic errors.

schema_version: 1
catalog_id: llm-physics-errors-field-theory
description: Field theory and advanced topic LLM physics errors

errors:
  - id: E086
    name: wrong_faddeev_popov_ghost
    category: computational
    severity: critical
    description: Wrong ghost Lagrangian or missing ghost contribution.
    detection: Verify ghost action from gauge-fixing procedure. Check ghost number conservation.

  - id: E087
    name: gribov_copies_ignored
    category: conceptual
    severity: major
    description: Gribov ambiguity not addressed in non-abelian gauge fixing.
    detection: Relevant for non-perturbative gauge theory. Check if within first Gribov horizon.

  - id: E088
    name: wrong_operator_mixing
    category: computational
    severity: major
    description: Ignoring operator mixing under renormalization.
    detection: Check if operators with same quantum numbers exist. Compute mixing matrix.

  - id: E089
    name: scheme_dependent_quantity_compared
    category: convention
    severity: major
    description: Comparing scheme-dependent quantities computed in different schemes.
    detection: Only compare scheme-independent quantities or convert explicitly.

  - id: E090
    name: wrong_ope_coefficient
    category: computational
    severity: major
    description: Wrong operator product expansion coefficient.
    detection: Verify by computing 3-point function. Check normalization of operators.

  - id: E091
    name: fermion_sign_in_many_body
    category: computational
    severity: critical
    description: Wrong fermion sign from anticommutation in many-body calculation.
    detection: Track all fermion permutations explicitly. Check Slater determinant signs.

  - id: E092
    name: keldysh_contour_error
    category: computational
    severity: critical
    description: Wrong time ordering on Keldysh contour (real-time formalism).
    detection: Verify contour ordering. Check greater/lesser/retarded/advanced components.

  - id: E093
    name: matsubara_sum_error
    category: computational
    severity: major
    description: Wrong Matsubara frequency sum (missing factors, wrong contour).
    detection: Verify sum by contour integration. Check boson (2n*pi*T) vs fermion ((2n+1)*pi*T).

  - id: E094
    name: wrong_kubo_formula
    category: computational
    severity: major
    description: Wrong Kubo formula for transport coefficient.
    detection: Check correct correlation function. Verify analytic continuation from imaginary time.

  - id: E095
    name: goldstone_theorem_violation
    category: conceptual
    severity: critical
    description: Missing massless Goldstone boson for broken continuous symmetry.
    detection: Count broken generators. Each gives one Goldstone boson (or two in non-relativistic).

  - id: E096
    name: wrong_beta_function_coefficient
    category: computational
    severity: major
    description: Wrong coefficient in RG beta function.
    detection: Cross-check with known results (e.g., b_0 = 11/3 C_2(G) - 4/3 T(R) n_f for QCD).

  - id: E097
    name: fixed_point_stability_error
    category: computational
    severity: major
    description: Wrong stability analysis of RG fixed point.
    detection: Check eigenvalues of stability matrix. Verify relevant vs irrelevant directions.

  - id: E098
    name: wrong_central_charge
    category: computational
    severity: major
    description: Wrong central charge in 2D CFT or Virasoro algebra.
    detection: Verify from free field counting or c-theorem. Check modular invariance.

  - id: E099
    name: wrong_chern_simons_level
    category: computational
    severity: major
    description: Wrong Chern-Simons level or level quantization violated.
    detection: k must be integer. Check level shift from fermion integration.

  - id: E100
    name: string_theory_modular_invariance
    category: computational
    severity: critical
    description: Partition function not modular invariant.
    detection: Check under S and T transformations. Verify GSO projection.

  - id: E101
    name: wrong_superconformal_index
    category: computational
    severity: major
    description: Wrong superconformal index computation.
    detection: Verify single-letter indices. Check plethystic exponential.

  - id: E102
    name: monopole_charge_quantization
    category: conceptual
    severity: major
    description: Dirac quantization condition violated.
    detection: Check eg = n/2 (integer or half-integer). Verify string consistency.

  - id: E103
    name: entropy_sign_error
    category: computational
    severity: major
    description: Entropy with wrong sign (should be non-negative).
    detection: S = -Tr(rho ln rho) >= 0. Check for calculation errors if negative.

  - id: E104
    name: causality_violation_in_propagator
    category: computational
    severity: critical
    description: Propagator violates microcausality (non-zero commutator outside light cone).
    detection: Check [phi(x), phi(y)] = 0 for spacelike separation. Verify propagator support.
