# Astrophysics Verification Checklist — Physics Bundle
# Derived from specs/references/verification-domain-astrophysics.md

schema_version: 2
domain: astrophysics
description: >
  Verification checklist for astrophysics calculations. Covers stellar structure,
  accretion physics, nuclear burning, observational consistency, and gravitational
  wave source checks.
source_file: references/verification-domain-astrophysics.md
subfields: [astrophysics, stellar, galactic]

checks:
  # --- Stellar structure ---

  hydrostatic_equilibrium:
    id: astro-str-01
    name: Hydrostatic equilibrium
    description: >
      dP/dr = -G*M(r)*rho(r)/r^2 (Newtonian) or TOV equation (relativistic).
      Deviation > 1% = not in equilibrium. TOV mandatory for neutron stars.
    condition: "|dP/dr + G*M(r)*rho(r)/r^2| / |G*M(r)*rho(r)/r^2| < 0.01"
    severity: critical

  mass_luminosity:
    id: astro-str-02
    name: Mass-luminosity relation
    description: >
      L ~ M^alpha with alpha ~3.5-4 for main sequence. Must satisfy L < L_Edd
      for stable stars.
    condition: "L < L_Edd and L ~ M^{3.5-4} for main sequence"
    severity: major

  chandrasekhar_limit:
    id: astro-str-03
    name: Chandrasekhar mass limit
    description: >
      M_Ch = 1.44 * (2/mu_e)^2 M_sun. White dwarf exceeding M_Ch without
      additional physics (rotation, magnetic fields) is an error.
    condition: "M_WD <= 1.44 * (2/mu_e)^2 M_sun"
    severity: critical

  # --- Accretion physics ---

  eddington_luminosity:
    id: astro-acc-01
    name: Eddington luminosity
    description: >
      L_Edd = 1.26e38 * (M/M_sun) erg/s. Super-Eddington accretion requires
      special treatment (radiation-driven outflows, slim disk models).
    condition: "L_Edd = 1.26e38 * (M/M_sun) erg/s; super-Eddington flagged"
    severity: critical
    test_template: |
      def verify_eddington_limit(luminosity, mass_solar, tol=0.01):
          L_Edd = 1.26e38 * mass_solar  # erg/s
          if luminosity > L_Edd * (1 + tol):
              return False  # super-Eddington without special treatment
          return True

  bondi_accretion:
    id: astro-acc-02
    name: Bondi accretion rate
    description: >
      M_dot_Bondi = 4*pi*lambda*(G*M)^2*rho_inf / c_s_inf^3. Verify Bondi
      radius r_B = GM/c_s^2 is resolved in simulation.
    condition: "Bondi radius resolved by simulation grid"
    severity: major

  accretion_efficiency:
    id: astro-acc-03
    name: Accretion disk efficiency
    description: >
      Thin disk efficiency between 0.057 (Schwarzschild) and 0.42 (max Kerr).
      Efficiency > 0.42 violates cosmic censorship.
    condition: "0 < eta <= 0.42"
    severity: critical

  # --- Nuclear burning ---

  nuclear_reaction_rates:
    id: astro-nuc-01
    name: Nuclear reaction rate verification
    description: >
      Verify Gamow peak energy, compare with JINA REACLIB/NACRE II tables.
      Disagreement > factor 2 = wrong rate.
    condition: "rates within factor 2 of REACLIB/NACRE II tables"
    severity: major

  nuclear_statistical_equilibrium:
    id: astro-nuc-02
    name: Nuclear statistical equilibrium (NSE)
    description: >
      At T > 5e9 K, NSE composition dominated by iron-group. At T > 1e10 K,
      shifts to light elements (alpha particles, free nucleons).
    condition: "NSE composition matches expected T-dependent behavior"
    severity: major

  # --- Observational consistency ---

  jeans_resolution:
    id: astro-obs-01
    name: Jeans mass and length resolution
    description: >
      lambda_J = c_s * sqrt(pi/(G*rho)). Must be resolved by simulation grid.
      Artificial fragmentation occurs if dx > lambda_J.
    condition: "dx < lambda_J (Jeans length resolved)"
    severity: critical
    test_template: |
      def verify_jeans_resolution(dx, c_s, G, rho):
          import numpy as np
          lambda_J = c_s * np.sqrt(np.pi / (G * rho))
          return dx < lambda_J

  virial_theorem:
    id: astro-obs-02
    name: Virial theorem
    description: >
      alpha_vir = 2*K/|U|. alpha_vir = 1 = virialized, < 1 = collapsing,
      > 1 = dispersing.
    condition: "alpha_vir consistent with system state"
    severity: major

  gw_source_consistency:
    id: astro-obs-03
    name: Gravitational wave source consistency
    description: >
      Chirp mass from inspiral waveform. Radiated energy ~5% of total mass for
      BBH mergers. Final BH spin ~0.69 for equal-mass non-spinning.
    condition: "E_rad / M_total ~ 0.05 for BBH; a_final ~ 0.69 for equal-mass"
    severity: major

  # --- Universal checks ---

  dimensional:
    id: astro-dim-01
    name: Astrophysical dimensional analysis
    description: >
      Luminosity: [energy/time]. Flux: [energy/time/area]. Column density:
      [1/area]. Optical depth: dimensionless. Gravitational potential: [velocity^2].
    severity: critical

  limiting_cases:
    id: astro-lim-01
    name: Astrophysical limiting cases
    description: >
      Newtonian limit (v/c << 1), optically thin/thick (tau << 1, >> 1),
      non-relativistic/ultra-relativistic spectra, Eddington luminosity.
    severity: critical
