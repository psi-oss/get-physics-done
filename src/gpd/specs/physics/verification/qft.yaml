# QFT Verification Checklist — Physics Bundle
# Domain-specific verification checks for quantum field theory calculations.
# Derived from specs/references/verification-domain-qft.md

schema_version: 2
domain: qft
description: >
  Verification checklist for quantum field theory calculations. Covers Ward
  identities, unitarity, causality, positivity, crossing symmetry, and
  subfield-specific checks for QFT and particle physics.
source_file: references/verification-domain-qft.md
subfields: [qft, particle-physics, gauge-theory, qed, qcd]

checks:
  # --- Core checks (always applied) ---

  ward_identity:
    id: qft-ward-01
    name: Ward-Takahashi identity
    description: >
      q_mu Gamma^mu(p+q, p) = S^{-1}(p+q) - S^{-1}(p). Exact constraint from
      gauge symmetry. Violation indicates broken gauge invariance or computational
      error. Consequences: Z_1 = Z_2, charge not renormalized.
    condition: "max|q_mu Gamma^mu - (S^{-1}(p+q) - S^{-1}(p))| < 1e-10"
    severity: critical
    test_template: |
      def verify_ward_identity(vertex, propagator_inv, momentum_transfer):
          lhs = np.einsum('i,i...->...', momentum_transfer, vertex)
          rhs = propagator_inv['p_plus_q'] - propagator_inv['p']
          deviation = np.max(np.abs(lhs - rhs))
          return deviation < 1e-10

  goldstone_theorem:
    id: qft-ward-02
    name: Goldstone theorem
    description: >
      If a continuous symmetry is spontaneously broken, there must be a massless
      (Goldstone) mode for each broken generator. Verify pole at p^2 = 0 in the
      propagator for each broken generator.
    condition: "pole at p^2 = 0 for each broken generator"
    severity: critical

  optical_theorem:
    id: qft-unit-01
    name: Optical theorem
    description: >
      Im[f(0)] = (k/(4*pi)) * sigma_total. Exact relation between forward
      scattering amplitude and total cross section. Failure means unitarity violation.
    condition: "|Im[f(0)] - k*sigma_total/(4*pi)| / |k*sigma_total/(4*pi)| < 0.01"
    severity: critical
    test_template: |
      def verify_optical_theorem(forward_amplitude, total_cross_section, k, tol=0.01):
          lhs = forward_amplitude.imag
          rhs = k * total_cross_section / (4 * np.pi)
          return abs(lhs - rhs) / abs(rhs) < tol if rhs != 0 else abs(lhs) < tol

  partial_wave_unitarity:
    id: qft-unit-02
    name: Partial wave unitarity
    description: >
      |S_l| <= 1 for each partial wave. Equivalently 0 <= sigma_l <= 4*pi*(2l+1)/k^2.
      At high energies, Froissart bound: sigma_total <= (pi/m_pi^2) ln^2(s/s_0).
    condition: "|S_l| <= 1 + tolerance for all l"
    severity: critical
    test_template: |
      def verify_unitarity_bound(partial_wave_amplitudes, k, tol=1e-8):
          for l, a_l in enumerate(partial_wave_amplitudes):
              S_l = 1 + 2j * k * a_l
              if abs(S_l) > 1 + tol:
                  return False
          return True

  perturbative_unitarity:
    id: qft-unit-03
    name: Perturbative unitarity bound
    description: >
      |a_0| <= 1/2 for s-wave partial wave amplitude. Gives upper bound on
      coupling, e.g. lambda <= 8*pi for phi^4 theory.
    condition: "|a_0| <= 0.5"
    severity: major

  retarded_causality:
    id: qft-caus-01
    name: Retarded causality
    description: >
      G^R(t) = 0 for t < 0. Retarded response function must vanish before
      perturbation. G^R(omega) analytic in upper half of complex omega-plane.
    condition: "max|G^R(t < 0)| < 1e-10"
    severity: critical
    test_template: |
      def verify_retarded_causality(G_R_time, time_grid, tol=1e-10):
          negative_time_mask = time_grid < 0
          max_violation = np.max(np.abs(G_R_time[negative_time_mask]))
          return max_violation < tol

  microcausality:
    id: qft-caus-02
    name: Microcausality
    description: >
      [phi(x), phi(y)] = 0 for (x-y)^2 < 0 (spacelike separation). Commutator
      must vanish outside light cone.
    condition: "|[phi(x), phi(y)]| = 0 for spacelike (x-y)"
    severity: critical

  spectral_positivity:
    id: qft-pos-01
    name: Spectral function positivity
    description: >
      A(k, omega) >= 0 for all k, omega. Related to Im[G^R] via
      A = -(1/pi) Im[G^R]. Negative spectral weight is always unphysical.
    condition: "A(k, omega) >= 0 everywhere"
    severity: critical

  cross_section_positivity:
    id: qft-pos-02
    name: Cross section positivity
    description: >
      d(sigma)/d(Omega) >= 0 for all angles. This is |amplitude|^2 which is
      inherently non-negative.
    condition: "d(sigma)/d(Omega) >= 0"
    severity: critical

  reflection_positivity:
    id: qft-pos-03
    name: Reflection positivity (Euclidean QFT)
    description: >
      <O*(tau) O(0)> >= 0 for tau > 0. Required for Osterwalder-Schrader
      reconstruction of Hilbert space. Violation means theory has no sensible
      quantum mechanical interpretation.
    condition: "<O*(tau) O(0)> >= 0 for tau > 0"
    severity: critical

  free_energy_convexity:
    id: qft-pos-04
    name: Free energy convexity
    description: >
      F(T,V,N) concave in T, convex in V. d^2F/dV^2 > 0 (positive compressibility),
      -d^2F/dT^2 > 0 (positive specific heat).
    condition: "d^2F/dV^2 > 0 and -d^2F/dT^2 > 0"
    severity: major

  crossing_symmetry:
    id: qft-cross-01
    name: Crossing symmetry
    description: >
      For identical particles, the amplitude must be invariant under s <-> t.
      Powerful algebraic check requiring no numerical evaluation of integrals.
    condition: "M(s,t,u) = M(t,s,u) for identical particles"
    severity: critical

  gauge_independence:
    id: qft-gauge-01
    name: Gauge independence of observables
    description: >
      Physical observables must not depend on gauge-fixing parameter xi.
      Compute same observable in two gauges and verify agreement.
    condition: "O(xi_1) = O(xi_2) for physical observable O"
    severity: critical

  uv_divergence_structure:
    id: qft-uv-01
    name: UV divergence structure
    description: >
      Poles must match power counting. Beta function coefficient is
      scheme-independent at one loop. UV finiteness after renormalization.
    condition: "UV poles match power counting; renormalized result finite"
    severity: critical

  # --- Red flags ---

  froissart_bound:
    id: qft-red-01
    name: Froissart bound check
    description: >
      Cross section growing faster than ln^2(s) at high energy violates
      Froissart bound. This is a definitive error.
    condition: "sigma_total <= C * ln^2(s/s_0)"
    severity: critical

  gauge_artifact_check:
    id: qft-red-02
    name: Gauge artifact detection
    description: >
      Non-zero result when replacing polarization epsilon_mu -> k_mu for a
      gauge-invariant observable. Amplitude depending on xi.
    condition: "epsilon_mu -> k_mu gives zero for gauge-invariant observables"
    severity: critical

  fermion_loop_sign:
    id: qft-red-03
    name: Fermion loop sign factor
    description: >
      Each closed fermion loop contributes a factor of (-1). Missing this is
      one of the most common Feynman diagram errors.
    condition: "(-1)^(number of fermion loops) factor included"
    severity: critical

  # --- Dimensional analysis (universal) ---

  dimensional:
    id: qft-dim-01
    name: Dimensional analysis
    description: >
      Every expression must carry correct mass dimensions in natural units.
      [field] = [mass]^{(d-2)/2}, propagator ~ 1/p^2, loop integral d^dk ~ [mass]^d.
    procedure: |
      1. Assign dimensions: [field] = [mass]^{(d-2)/2}
      2. Verify both sides of every equation have same dimension
      3. Propagator: scalar ~ 1/p^2, fermion ~ 1/p, gauge ~ 1/p^2
      4. Loop integrals: d^dk contributes [mass]^d
    severity: critical

  sign_convention:
    id: qft-sign-01
    name: Sign conventions
    description: >
      Metric signature, Fourier transform signs, Wick rotation, fermion signs,
      and i*epsilon prescription must be consistent throughout.
    procedure: |
      1. Metric signature consistent across all expressions
      2. Fourier transform signs consistent (check convention lock)
      3. Wick rotation k^0 -> ik_E^4 tracked correctly
      4. Fermion signs (-1)^F for loops included
      5. i*epsilon prescription consistent in propagators
    severity: critical

  index_consistency:
    id: qft-idx-01
    name: Index contractions and tensor structure
    description: >
      Every repeated index summed (one up, one down). Free indices match on
      both sides. Trace of gamma matrices checked. Levi-Civita sign convention.
    procedure: |
      1. Every repeated index summed (one up, one down)
      2. Free indices match on both sides of equations
      3. Trace of gamma matrices: check dimension and normalization
      4. Levi-Civita: check epsilon^{0123} = +1 or -1 convention
    severity: major
