# Fluid Dynamics & Plasma Physics Verification Checklist — Physics Bundle
# Derived from specs/references/verification-domain-fluid-plasma.md

schema_version: 2
domain: fluid-plasma
description: >
  Verification checklist for fluid dynamics and plasma physics. Covers MHD
  equilibrium, wave dispersion, stability analysis, magnetic reconnection,
  turbulence spectra, conservation laws, and numerical diagnostics.
source_file: references/verification-domain-fluid-plasma.md
subfields: [fluid-dynamics, plasma-physics, magnetohydrodynamics]

checks:
  # --- MHD equilibrium ---

  mhd_force_balance:
    id: fp-eq-01
    name: Static MHD equilibrium
    description: >
      J x B = grad(p). Verify |J x B - grad(p)| / |J x B| < 1e-3.
    condition: "|J x B - grad(p)| / |J x B| < 1e-3"
    severity: critical

  grad_shafranov:
    id: fp-eq-02
    name: Grad-Shafranov equation residual
    description: >
      Residual |LHS - RHS| / max(|LHS|) < 1e-6. Safety factor q(0) > 1
      for stability. Verify Shafranov shift.
    condition: "GS residual < 1e-6; q(0) > 1"
    severity: critical

  # --- Waves and dispersion ---

  alfven_wave:
    id: fp-wav-01
    name: Alfven wave dispersion
    description: >
      omega = k_parallel * v_A. Phase velocity must match v_A within 1%.
    condition: "|v_phase - v_A| / v_A < 0.01"
    severity: major

  cfl_fast_speed:
    id: fp-wav-02
    name: CFL with fast magnetosonic speed
    description: >
      CFL constraint uses FAST magnetosonic speed, not just sound speed.
      CFL number > 1 = unstable.
    condition: "dt < C * dx / max(|v| + c_f)"
    severity: critical

  # --- Stability ---

  rayleigh_taylor_mhd:
    id: fp-stab-01
    name: MHD Rayleigh-Taylor instability
    description: >
      Growth rate cannot exceed hydrodynamic gamma_hydro. Magnetic field
      stabilizes modes with k * v_A > gamma_hydro.
    condition: "gamma <= gamma_hydro; stabilization for k*v_A > gamma_hydro"
    severity: major

  kelvin_helmholtz:
    id: fp-stab-02
    name: Kelvin-Helmholtz instability
    description: >
      Maximum growth rate gamma_max = k*V_0/2. Stabilized for v_A > V_0/2.
      Compressible stabilization at Mach > 2.
    condition: "gamma_max = k*V_0/2; stabilized for v_A > V_0/2"
    severity: major

  tearing_mode:
    id: fp-stab-03
    name: Tearing mode instability
    description: >
      FKR scaling gamma ~ S^{-3/5} for Lundquist number S. Resistive layer
      must be resolved. Plasmoid instability onset at S > 1e4.
    condition: "gamma ~ S^{-3/5}; resistive layer resolved"
    severity: major

  # --- Reconnection ---

  sweet_parker:
    id: fp-rec-01
    name: Sweet-Parker reconnection rate
    description: >
      Rate v_in/v_A ~ S^{-1/2}. Current sheet width delta ~ L*S^{-1/2} must
      be resolved. Very slow for large S.
    condition: "v_in/v_A ~ S^{-1/2}; current sheet resolved"
    severity: major

  # --- Turbulence ---

  kolmogorov_spectrum:
    id: fp-turb-01
    name: Kolmogorov turbulence spectrum
    description: >
      3D: E(k) ~ k^{-5/3} inertial range. 2D has INVERSE cascade — using 3D
      direction in 2D is wrong.
    condition: "E(k) ~ k^{-5/3} (3D); inverse cascade in 2D"
    severity: major

  mhd_turbulence:
    id: fp-turb-02
    name: MHD turbulence anisotropy
    description: >
      Iroshnikov-Kraichnan k^{-3/2} (isotropic) vs Goldreich-Sridhar k_perp^{-5/3}
      (anisotropic). Check residual energy and cross-helicity.
    condition: "spectrum consistent with IK or GS scaling"
    severity: major

  # --- Conservation ---

  mass_conservation:
    id: fp-cons-01
    name: Mass conservation
    description: >
      |M(t) - M(0)| / M(0) < 1e-10 for conservative schemes.
    condition: "|Delta M / M| < 1e-10"
    severity: critical

  energy_conservation_mhd:
    id: fp-cons-02
    name: Energy conservation (MHD)
    description: >
      Ideal MHD: dE_total/dt = 0. Resistive: monotonically decreasing (Ohmic
      dissipation). Energy increasing = numerical error.
    condition: "dE_total/dt = 0 (ideal) or dE_total/dt < 0 (resistive)"
    severity: critical

  magnetic_helicity:
    id: fp-cons-03
    name: Magnetic helicity conservation
    description: >
      Ideal MHD: dH_m/dt = 0. Resistive: decays slower than energy.
      H_m growing = numerical error.
    condition: "dH_m/dt = 0 (ideal); H_m not growing (resistive)"
    severity: critical

  rankine_hugoniot:
    id: fp-cons-04
    name: Rankine-Hugoniot jump conditions
    description: >
      5 conditions across shock fronts. Compression ratio <= 4 for gamma = 5/3.
      Entropy must increase across shock.
    condition: "compression ratio <= 4; entropy increases"
    severity: critical

  # --- Numerical diagnostics ---

  div_b_constraint:
    id: fp-num-01
    name: Divergence-free constraint (div B)
    description: >
      Constrained transport: < 1e-14. Divergence cleaning: < 1e-4.
      Global ratio |div B| * dx / |B| < 1e-4.
    condition: "|div B| * dx / |B| < 1e-4"
    severity: critical

  negative_pressure_density:
    id: fp-num-02
    name: Negative pressure/density check
    description: >
      Pressure and density must remain positive. Negative values indicate
      code bug or extreme CFL violation.
    condition: "p > 0 and rho > 0 everywhere"
    severity: critical

  dimensional:
    id: fp-dim-01
    name: Fluid/plasma dimensional analysis
    description: >
      Re, Mach, plasma beta dimensionless. Alfven speed: [velocity].
      Debye length: [length]. Lundquist number: dimensionless.
    severity: critical
