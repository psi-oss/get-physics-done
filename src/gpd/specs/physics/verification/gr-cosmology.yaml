# GR & Cosmology Verification Checklist — Physics Bundle
# Derived from specs/references/verification-domain-gr-cosmology.md

schema_version: 2
domain: gr-cosmology
description: >
  Verification checklist for general relativity and cosmology. Covers constraint
  propagation, ADM conservation, gauge invariance, energy conditions, Friedmann
  equations, CMB consistency, and distance-redshift relations.
source_file: references/verification-domain-gr-cosmology.md
subfields: [general-relativity, cosmology, gravitational-waves]

checks:
  hamiltonian_constraint:
    id: gr-con-01
    name: Hamiltonian constraint
    description: >
      H = R^(3) + K^2 - K_ij K^ij - 16*pi*rho = 0. Monitor |H| at every
      timestep. Typical tolerance 1e-6 to 1e-10.
    condition: "|H| < 1e-6 throughout evolution"
    severity: critical
    test_template: |
      def verify_hamiltonian_constraint(H_values, tol=1e-6):
          return np.max(np.abs(H_values)) < tol

  momentum_constraint:
    id: gr-con-02
    name: Momentum constraint
    description: >
      M^i = D_j(K^ij - gamma^ij K) - 8*pi*j^i = 0. Same monitoring as
      Hamiltonian constraint.
    condition: "|M^i| < 1e-6 throughout evolution"
    severity: critical

  adm_mass_conservation:
    id: gr-con-03
    name: ADM mass conservation
    description: >
      M_ADM constant for isolated systems. Decreases by GW energy for radiating
      systems. Growing M_ADM = numerical error.
    condition: "M_ADM(t) <= M_ADM(0) for radiating systems"
    severity: critical

  gauge_independence:
    id: gr-gauge-01
    name: Gauge independence of observables
    description: >
      Physical observables must be gauge-independent. Compute in TWO gauge
      conditions and verify agreement.
    condition: "O(gauge_1) = O(gauge_2) for physical observables"
    severity: critical

  bardeen_potentials:
    id: gr-gauge-02
    name: Cosmological perturbation gauge invariance
    description: >
      Bardeen potentials Phi_B, Psi_B must agree in conformal Newtonian and
      synchronous gauges to machine precision.
    condition: "Phi_B(conformal Newtonian) = Phi_B(synchronous)"
    severity: critical

  energy_conditions:
    id: gr-ec-01
    name: Energy conditions (WEC, NEC, SEC, DEC)
    description: >
      NEC violation = exotic matter. WEC violation = negative energy density.
      SEC violation = dark energy (acceptable in cosmology). Flag all violations.
    condition: "energy condition violations flagged with physical justification"
    severity: major

  friedmann_consistency:
    id: gr-cos-01
    name: Friedmann equation consistency
    description: >
      First Friedmann, second Friedmann, and continuity equation — any two imply
      the third. Verify all three independently.
    condition: "all three Friedmann equations consistent"
    severity: critical

  cmb_normalization:
    id: gr-cos-02
    name: CMB power spectrum normalization
    description: >
      Sachs-Wolfe plateau, first acoustic peak at l ~ 220, A_s ~ 2.1e-9,
      n_s ~ 0.965. Peak ratios constrain baryon density.
    condition: "CMB peaks consistent with Planck 2018 parameters"
    severity: major

  etherington_reciprocity:
    id: gr-cos-03
    name: Distance-redshift consistency
    description: >
      Etherington reciprocity d_L = (1+z)^2 * d_A is EXACT. d_A has maximum
      at z ~ 1.6 for LCDM.
    condition: "d_L = (1+z)^2 * d_A exactly"
    severity: critical

  gw_energy_balance:
    id: gr-cos-04
    name: Gravitational wave energy balance
    description: >
      Quadrupole formula, chirp mass from inspiral. Peters formula for orbit
      decay. Energy radiated must equal ADM mass decrease.
    condition: "E_GW = Delta M_ADM"
    severity: critical

  sign_convention:
    id: gr-sign-01
    name: GR sign conventions
    description: >
      Metric signature (+--- vs -+++), Riemann tensor sign (MTW vs Weinberg vs
      Wald), Einstein equation sign, Christoffel symbol definition.
    severity: critical

  dimensional:
    id: gr-dim-01
    name: GR dimensional analysis
    description: >
      Einstein equations dimensionally consistent. Riemann tensor: [length]^{-2}.
      H_0 in km/s/Mpc. Omega dimensionless.
    severity: critical
