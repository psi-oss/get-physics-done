# Physics Verification Checklists — Domain Index
# Maps physics domains to their verification checklist reference files.
# Used by the bundle loader to inject domain-specific verification guidance.

version: 1

core:
  file: references/verification-core.md
  description: Core verification checks applicable to all physics domains.
  checks:
    - dimensional_analysis
    - limiting_cases
    - symmetry_properties
    - conservation_laws
    - numerical_validation
    - sign_conventions
    - index_consistency

domains:
  qft:
    file: references/verification-domain-qft.md
    description: Quantum field theory verification (Feynman diagrams, renormalization, Ward identities).
    subfields: [qft, particle-physics, gauge-theory, qed, qcd]

  statmech:
    file: references/verification-domain-statmech.md
    description: Statistical mechanics (partition functions, phase transitions, critical exponents).
    subfields: [statistical-mechanics, thermodynamics, critical-phenomena]

  condmat:
    file: references/verification-domain-condmat.md
    description: Condensed matter (band structure, many-body, topological phases).
    subfields: [condensed-matter, solid-state, many-body]

  gr_cosmology:
    file: references/verification-domain-gr-cosmology.md
    description: General relativity and cosmology (Einstein equations, FLRW, perturbation theory).
    subfields: [general-relativity, cosmology, gravitational-waves]

  amo:
    file: references/verification-domain-amo.md
    description: Atomic, molecular, and optical physics (selection rules, transition rates).
    subfields: [atomic, molecular, optical, quantum-optics]

  nuclear_particle:
    file: references/verification-domain-nuclear-particle.md
    description: Nuclear and particle physics (cross sections, decay rates, symmetry breaking).
    subfields: [nuclear, particle, high-energy]

  astrophysics:
    file: references/verification-domain-astrophysics.md
    description: Astrophysics (stellar structure, radiative transfer, gravitational dynamics).
    subfields: [astrophysics, stellar, galactic]

  mathematical_physics:
    file: references/verification-domain-mathematical-physics.md
    description: Mathematical physics (integrability, special functions, algebraic structures).
    subfields: [mathematical-physics, integrable-systems, representation-theory]

  soft_matter:
    file: references/verification-domain-soft-matter.md
    description: Soft matter and biophysics (polymers, membranes, active matter).
    subfields: [soft-matter, biophysics, polymer-physics]

  fluid_plasma:
    file: references/verification-domain-fluid-plasma.md
    description: Fluid dynamics and plasma physics (Navier-Stokes, MHD, turbulence).
    subfields: [fluid-dynamics, plasma-physics, magnetohydrodynamics]

  quantum_info:
    file: references/verification-domain-quantum-info.md
    description: Quantum information (entanglement, error correction, quantum algorithms).
    subfields:
      [quantum-information, quantum-computing, quantum-error-correction]

# Supplementary verification references
supplementary:
  numerical:
    file: references/verification-numerical.md
    description: Numerical computation verification (convergence, error budgets, stability).
  patterns:
    file: references/verification-patterns.md
    description: Cross-domain verification patterns and anti-patterns.
  gap_analysis:
    file: references/verification-gap-analysis.md
    description: Analysis of verification coverage gaps.
  independence:
    file: references/verification-independence.md
    description: Verification independence guidelines (checks must be independent).
