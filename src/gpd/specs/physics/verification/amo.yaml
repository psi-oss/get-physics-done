# AMO Verification Checklist — Physics Bundle
# Domain-specific verification checks for atomic, molecular, and optical physics.
# Derived from specs/references/verification-domain-amo.md

schema_version: 2
domain: amo
description: >
  Verification checklist for AMO physics calculations. Covers selection rules,
  dipole approximation, rotating wave approximation, sum rules, decoherence,
  and laser-atom interaction checks.
source_file: references/verification-domain-amo.md
subfields: [atomic, molecular, optical, quantum-optics]

checks:
  # --- Selection rules ---

  e1_selection_rules:
    id: amo-sel-01
    name: Electric dipole (E1) selection rules
    description: >
      Delta l = +/-1 (parity change), Delta m_l = 0/+/-1, Delta m_s = 0,
      Delta J = 0/+/-1 (J=0 -> J=0 FORBIDDEN). Compute <f|r|i> for claimed
      forbidden transitions; must be EXACTLY zero by symmetry.
    condition: "<f|r|i> = 0 for forbidden transitions"
    severity: critical

  trk_sum_rule:
    id: amo-sel-02
    name: Thomas-Reiche-Kuhn sum rule
    description: >
      sum_f f_{if} = Z (number of electrons), where f_{if} is the oscillator
      strength. Sum > Z means error in matrix elements or frequencies. Sum << Z
      means important transitions missing.
    condition: "sum_f f_{if} = Z (number of electrons)"
    severity: critical
    test_template: |
      def verify_trk_sum_rule(oscillator_strengths, Z, tol=0.01):
          f_sum = sum(oscillator_strengths)
          return abs(f_sum - Z) / Z < tol

  # --- Dipole approximation ---

  dipole_validity:
    id: amo-dip-01
    name: Dipole approximation validity
    description: >
      Electric dipole approximation exp(ik.r) ~ 1 valid when k*a_0 << 1.
      For k*a_0 > 0.1, need multipole expansion (M1, E2 corrections).
    condition: "k * a_0 << 1 (typically < 0.1)"
    severity: major

  rwa_validity:
    id: amo-dip-02
    name: Rotating wave approximation validity
    description: >
      RWA valid when Omega_R << omega_0. Breaks down at Omega_R/omega_0 > 0.1
      (ultrastrong coupling). Bloch-Siegert shift delta_BS = Omega_R^2/(4*omega_0)
      must be smaller than linewidth for RWA to hold.
    condition: "Omega_R / omega_0 < 0.1"
    severity: major
    test_template: |
      def verify_rwa_validity(Omega_R, omega_0, linewidth=None):
          ratio = Omega_R / omega_0
          delta_BS = Omega_R**2 / (4 * omega_0)
          rwa_ok = ratio < 0.1
          if linewidth is not None:
              rwa_ok = rwa_ok and delta_BS < linewidth
          return rwa_ok

  # --- Quantum optics ---

  rabi_frequency:
    id: amo-qo-01
    name: Rabi frequency normalization
    description: >
      Omega_R = d*E_0/hbar. Dimensions: [C*m * V/m / J*s] = rad/s.
      Resonant excitation: P_e(t) = sin^2(Omega_R*t/2). Pi-pulse at t = pi/Omega_R.
    condition: "[Omega_R] = rad/s; P_e(pi/Omega_R) = 1"
    severity: major

  ac_stark_shift:
    id: amo-qo-02
    name: AC Stark shift sign
    description: >
      V_dipole = -hbar*Omega_R^2/(4*delta). Red-detuned (delta < 0) MUST give
      negative (trapping) potential. Positive for red-detuned = sign error.
      Scattering rate Gamma_sc = Gamma*(Omega_R/(2*delta))^2 must be << trap frequency.
    condition: "sign(V_dipole) = -sign(delta) for far-detuned light"
    severity: critical

  decoherence_positivity:
    id: amo-qo-03
    name: Lindblad decoherence rate positivity
    description: >
      All Lindblad decay rates gamma_k >= 0 (complete positivity). Negative gamma_k
      makes evolution non-physical. T_2 <= 2*T_1 always. Steady-state rho_ss must
      be valid density matrix.
    condition: "gamma_k >= 0 for all k; T_2 <= 2*T_1"
    severity: critical

  # --- Scattering ---

  optical_theorem_atomic:
    id: amo-scat-01
    name: Optical theorem (atomic scattering)
    description: >
      sigma_total = (4*pi/k) * Im[f(0)]. Cross-check by integrating |f(theta)|^2
      over angles and comparing with Im[f(0)].
    condition: "sigma_total = (4*pi/k) * Im[f(0)]"
    severity: critical

  low_energy_scattering:
    id: amo-scat-02
    name: Low-energy s-wave scattering
    description: >
      For ultracold atoms: f(k) -> -a/(1+ika). sigma_total -> 4*pi*a^2
      (distinguishable) or 8*pi*a^2 (identical bosons). Scattering length sign:
      a > 0 repulsive, a < 0 attractive. Feshbach resonance: a(B) = a_bg*(1-Delta/(B-B_0)).
    condition: "correct symmetrization factor and scattering length sign"
    severity: major

  franck_condon:
    id: amo-scat-03
    name: Franck-Condon factor completeness
    description: >
      FCF = |<v'|v">|^2. sum_{v'} FCF(v',v") = 1 for each v" (completeness).
      All FCF >= 0 (squared overlap).
    condition: 'sum_{v''} FCF(v'',v") = 1 and all FCF >= 0'
    severity: major

  # --- Universal checks ---

  dimensional:
    id: amo-dim-01
    name: AMO dimensional analysis
    description: >
      Energy in eV, Hartree, or cm^{-1}. Length in Bohr radii or Angstroms.
      Dipole matrix elements: [charge * length]. Cross-sections: [area].
    procedure: |
      1. Energy: eV, Hartree, or cm^{-1} — declare units
      2. Length: Bohr radii (a_0) or Angstroms
      3. Dipole matrix elements: [charge * length]
      4. Cross-sections: [area] (barns, cm^2, a_0^2)
    severity: critical

  limiting_cases:
    id: amo-lim-01
    name: AMO limiting cases
    description: >
      Hydrogen energies E_n = -13.6/n^2 eV. Perturbation theory: linear Stark
      for degenerate states. High-field: Paschen-Back. Classical limit:
      correspondence principle for Rydberg states.
    procedure: |
      1. Hydrogen atom: exact energies E_n = -13.6 eV / n^2
      2. Linear Stark effect for degenerate states
      3. High-field limit: Paschen-Back
      4. Classical limit: correspondence principle for high-n Rydberg
      5. Non-relativistic limit: Schrodinger from Dirac
    severity: critical
