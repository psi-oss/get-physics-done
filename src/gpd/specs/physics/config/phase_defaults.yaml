# Default phase configurations for physics-aware MCTS parameter adjustment.
#
# Each phase maps to a PhaseConfig controlling PUCT exploration, prior
# multipliers, bundle injection period, verification threshold, and
# state compaction.  Override per-project by placing a copy at
# .planning/phase_config.yaml.

formulation:
  c_puct: 2.0
  prior_multipliers:
    Plan: 1.5
    Strategize: 1.5
    Ground: 2.0
    Work: 0.5
  bundle_period: 5
  verification_threshold: 0.3
  compaction_enabled: false

derivation:
  c_puct: 1.2
  prior_multipliers:
    Work: 1.5
    Ground: 0.8
  bundle_period: 10
  verification_threshold: 0.5
  compaction_enabled: false

validation:
  c_puct: 0.6
  prior_multipliers:
    CritiqueImprove: 1.5
    SolveImprove: 1.5
    Work: 0.5
  bundle_period: 20
  verification_threshold: 0.7
  compaction_enabled: true
