# VerifierWriter Service — Base Bundle
# Wraps TaskAgent parallel verifier pipeline.

schema_version: 1
prompt_id: VerifierWriter
description: |
  Generates task verifiers using parallel LLM pipelines with selection
  judging and critic feedback refinement. Wraps TaskAgent's
  ParallelVerifierPipeline for automated verifier code generation.

config_schema:
  plan_path:
    type: string
    required: true
    meaning: Path to the plan/context used for verifier generation.
  research_path:
    type: string
    required: false
    meaning: Path to research context (optional).
  toolkit_context_path:
    type: string
    required: false
    meaning: Path to toolkit context for tool-aware verifier generation.
  profile:
    type: string
    enum: [dev, prod]
    default: dev
    meaning: Generation profile (dev = faster/cheaper, prod = thorough).
  max_refine_rounds:
    type: integer
    min: 1
    max: 10
    default: 3
    meaning: Maximum refinement rounds with critic feedback.
  compliance_enabled:
    type: boolean
    default: true
    meaning: Run compliance checks on generated verifier code.
  cleanup_workspace:
    type: boolean
    default: true
    meaning: Clean up temporary files after generation.

# Service descriptor (not yet loadable — needs top-level service_id for ServiceSpec registry).
# TODO(RES-360): Implement VerifierWriterService and promote to proper ServiceSpec format.
service_descriptor:
  service_id: verifier_writer
  kind: verifier_generation
  impl: "NOT_IMPLEMENTED:VerifierWriterService"
