# Base Spec Bundle — Domain-Neutral Agentic Research
# Provides the core actor prompts, action specs, service definitions, and
# default configuration for the hot-dag agentic search system.
# Domain overlays (e.g., physics/) extend this with specialized guidance.

name: base
version: "1.0.0"
domain: general
description: |
  Domain-neutral base bundle for agentic DAG search. Defines 6 actors
  (Researcher, Referee, Critic, Clerk, Merger, Solver), 15 actions
  across 3 buckets (execution, maintenance, repair), judge and service
  specs, and default system configuration. All prompts are model-agnostic
  and use {placeholder} patterns for runtime context injection.
dependencies: []
overrides: {}
