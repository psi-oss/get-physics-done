# Default Configuration — Base Bundle
# All values here can be overridden by domain overlays, project config, or env vars.

# ─── System Limits ──────────────────────────────────────────────────────────────
node_budget: 100
state_view_token_limit: 50000
max_concurrent_actions: 4
max_concurrent_judges: 2

# ─── Model Presets ──────────────────────────────────────────────────────────────
# Tier-based model assignment. Actual model IDs resolved at runtime via
# model_map in project config. Keys: S (small/fast), M (medium), L (large).
model_presets:
  S:
    effort: low
    description: Fast inference for routine tasks
  M:
    effort: medium
    description: Balanced quality/speed for most work
  L:
    effort: high
    description: Maximum quality for critical reasoning

# Actor-to-preset mapping (domain overlays may upgrade specific actors)
actor_presets:
  Researcher: S
  Referee: S
  Critic: S
  Clerk: S
  Merger: S
  Solver: S

# ─── Triage ──────────────────────────────────────────────────────────────────────
triage:
  enabled: true
  max_proposals: 5

# ─── Scheduling ──────────────────────────────────────────────────────────────────
bundle_scheduling:
  enabled: true
  k_branch: 3
  period_t: 30
  entropy_trigger: 0.6
  plateau_trigger:
    window: 10
    threshold: 0.01

merge_scout:
  enabled: true
  period_t: 25
  elite_top_k: 8

# ─── Evaluation ──────────────────────────────────────────────────────────────────
pairwise_judge:
  enabled: true
  compare_ancestors_k: 2
  same_depth_comparison: true
  dca_diff_stacks: true

simple_judge:
  enabled: false

# ─── Search ──────────────────────────────────────────────────────────────────────
puct:
  enabled: true
  c_puct: 0.6
  beta0: 0.1
  progressive_widening:
    m_max: 4

# ─── Diversity ───────────────────────────────────────────────────────────────────
diversity:
  top_b_expansions: 8

# ─── MCP Tools ───────────────────────────────────────────────────────────────────
mcp:
  enabled: true
  max_rounds: 10
  builtin_tiers:
    - tier0
    - tier1

# ─── Fixer ───────────────────────────────────────────────────────────────────────
fixer:
  enabled: true
  max_retries: 3

# ─── Feature Flags ───────────────────────────────────────────────────────────────
# Maps to gpd.core.observability feature flag keys.
# Overlay bundles can override individual flags.
feature_flags:
  gpd.enabled: true
  gpd.conventions.enabled: false
  gpd.verification.enabled: true
  gpd.protocols.enabled: false
  gpd.errors.enabled: false
  gpd.patterns.enabled: true
  gpd.diagnostics.tracing: true
  gpd.diagnostics.health_checks: true
