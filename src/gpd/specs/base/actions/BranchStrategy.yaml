# BranchStrategy Action — Base Bundle
# Scheduler-injected bundle action: creates K diverse strategy variants.

schema_version: 1
action_id: BranchStrategy
title: Branch Strategy
summary: |
  Create K diverse strategy variants from the same parent state. Each variant
  explores a different research approach, risk posture, or hypothesis.
  Scheduler-injected — NOT proposable by Referee.

schemas:
  params_json_schema: specs/schemas/params/BranchStrategyParams.json
  state_fields_touched:
    - /strategy
    - /gpd/branch_intent

write_set:
  allowed_write_prefixes:
    - /strategy
    - /gpd/branch_intent

write_recipe:
  version: 1
  containers:
    - op: replace
      path: /strategy
      value_required_keys: [framing, assumptions, approach, risk_posture]
    - op: replace
      path: /gpd/branch_intent
      value_required_keys:
        [
          mode,
          parent_goal,
          variant_label,
          strategy_summary,
          receives_results_back,
          rationale,
        ]

bundle_contract:
  required_touch_prefixes:
    - /strategy
    - /gpd/branch_intent
  touch_policy: all
  require_unique_patches: true

parameters:
  required:
    - name: K
      type: integer
      meaning: Number of strategy variants to produce.
    - name: diversity_axes
      type: array
      meaning: >
        Axes along which variants must differ. At minimum: hypothesis and risk_posture.
        Engine validates uniqueness across these axes.

triage_guidance: |
  NOT proposable. The scheduler injects BranchStrategy at:
  - Run startup (startup workflow)
  - Periodic diversity injection (every period_T nodes)
  - Entropy trigger (when search diversity drops below threshold)
  - Plateau detection (when scores stagnate)

action_guidance: |
  ## Bundle Contract
  - You MUST produce exactly K ExecutedAction entries in `executions`.
  - Each execution writes /strategy with a distinct approach.
  - Each execution also writes /gpd/branch_intent for the child branch it creates.
  - Engine commits each as a separate child node (branching).

  ## Diversity Requirements
  - Each variant MUST differ along the specified diversity_axes.
  - hypothesis: different core approach or methodology
  - risk_posture: conservative / balanced / exploratory
  - Variants should be genuinely different, not superficial rewording.

  ## Strategy Structure
  Each /strategy write should include:
  - framing: what the problem is and how this variant approaches it
  - assumptions: what this approach assumes (explicit, not hidden)
  - approach: concrete methodology (not vague hand-waving)
  - risk_posture: conservative / balanced / exploratory
  - success_criteria: what "done" looks like for this approach
  - evaluation_priorities: what metrics matter most

  ## Branch Intent Structure
  Each /gpd/branch_intent write should include:
  - mode: "terminal"
  - parent_goal: what the parent branch is trying to accomplish
  - variant_label: short name for this branch
  - strategy_summary: concise downstream mandate for the branch
  - diversity_axes: list copied from the execution bundle spec when present
  - top_k: branch budget when relevant
  - downstream_action_hint: optional next action/workflow for descendants
  - receives_results_back: false
  - rationale: why this branch exists

  ## Anti-Patterns
  - Producing K near-identical strategies with cosmetic differences
  - Omitting risk_posture or leaving it as "balanced" for all variants
  - Strategies that don't connect to the actual task requirements
  - Strategies that ignore documented failures from prior attempts

controller:
  bucket: maintenance
  proposable: false
  uniqueness:
    scope: root_depth1
    paths:
      - /strategy

execution:
  kind: commit
  shape: bundle
  actor_id: Researcher

engine_managed_params:
  K:
    attachment_kind: execution_bundle_spec
    pointer: /K_total
  diversity_axes:
    attachment_kind: execution_bundle_spec
    pointer: /diversity_axes
