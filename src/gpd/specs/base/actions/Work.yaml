# Work Action — Base Bundle
# Enhanced from hot-dag Work.yaml with structured execution protocol,
# knowledge graph discipline, and deviation handling.

schema_version: 1
action_id: Work
title: Work
summary: |
  Execute concrete research work that advances the plan.
  Flexible action: params provide a focus hint, but the executor decides
  what to touch to maximize progress within the commit budget.
  Records outcomes in the knowledge graph and maintains pointer discipline.

schemas:
  params_json_schema: specs/schemas/params/WorkParams.json
  state_fields_touched:
    - /plan/sections
    - /scratch_knowledge
    - /pointers
    - /intermediate_results
    - /open_questions
    - /decisions

write_set:
  allowed_write_prefixes:
    - /plan/sections
    - /scratch_knowledge
    - /pointers
    - /intermediate_results
    - /open_questions
    - /decisions

write_recipe:
  version: 1
  containers:
    - op: put
      path: /plan/sections
      value_required_keys: [title, status, content, pointers, subsections]
    - op: append
      path: /scratch_knowledge/notes
      value_required_keys: [id, content]
    - op: put
      path: /scratch_knowledge/key_values
    - op: append
      path: /pointers/logs
      value_required_keys: [ptr, kind]
    - op: append
      path: /intermediate_results
      value_required_keys: [id, equation, description, units, validity]
    - op: append
      path: /open_questions
      value_required_keys: [id, question, priority, context]
    - op: append
      path: /decisions
      value_required_keys: [id, decision, rationale]

parameters:
  optional:
    - name: focus_blurb
      type: string
      default: ""
      meaning: >
        Non-binding blurb describing why Work is proposed and where to focus.
        This is guidance, not a hard constraint.

triage_guidance: |
  Propose Work when:
  - There are actionable plan nodes to advance (status "waiting" or "in_progress").
  - The next step is concrete activity: implement, test, analyze, debug, validate, document.
  - Sufficient context exists (strategy, plan, grounding) to execute without guessing.

  In params.focus_blurb, provide a short focus hint (what to prioritize and why).
  Prefer a bounded slice of the plan — neither "everything" nor a micro-task.

action_guidance: |
  ## Execution Protocol
  1. Use params.focus_blurb as a non-binding focus hint
  2. Prioritize the most critical bottleneck given current plan status and recent knowledge
  3. Choose a bounded work package: large enough for meaningful progress, small enough to complete
  4. Prefer staying within a single top-level phase
  5. If cross-phase changes are needed, document why and leave pointers for follow-ups

  ## Plan Status Updates
  - waiting -> in_progress: when starting work on a node
  - in_progress -> done: when complete (REQUIRES non-empty pointers)
  - in_progress -> needs_revision: when issues are discovered
  - needs_revision -> revised: when revisions are incorporated

  ## Scratch Knowledge Discipline
  - Record key outcomes as notes in /scratch_knowledge/notes with {id, content, tags}
  - Use /scratch_knowledge/key_values for named results (equations, constants, scores)
  - Store heavy outputs cold and link via /pointers/* references
  - Record intermediate results in /intermediate_results with equation, units, and validity regime
  - Capture open questions in /open_questions with priority and context
  - Record significant decisions in /decisions with rationale

  ## Pointer Discipline
  - Do NOT mark a plan item "done" or "revised" unless pointers is non-empty
  - Pointers should reference knowledge items added/updated in this commit
  - Do NOT write /plan/summary (reserved for dedicated planning step)

modes:
  general:
    title: "Work/general"
    summary: "General-purpose research execution"
    triage_guidance: "Default mode for implementation, testing, analysis, debugging."
    action_guidance: "Execute the focus_blurb within commit budget."
  analysis:
    title: "Work/analysis"
    summary: "Data analysis and result interpretation"
    triage_guidance: "Propose when the next step is analyzing existing results or data."
    action_guidance: "Focus on interpreting results, identifying patterns, and recording findings."
  implementation:
    title: "Work/implementation"
    summary: "Code or solution implementation"
    triage_guidance: "Propose when the next step is building or implementing a solution component."
    action_guidance: "Focus on implementing the approach described in the plan."
  validation:
    title: "Work/validation"
    summary: "Testing and validation of results"
    triage_guidance: "Propose when results need systematic validation or testing."
    action_guidance: "Focus on testing, validating, and verifying existing work."

examples:
  - name: Mark plan item in progress, add finding note
    writes_example: |
      [
        {"op":"set","path":"/plan/sections/foundation/status","value":"in_progress"},
        {"op":"append","path":"/scratch_knowledge/notes","value":{"id":"note-baseline-evidence","content":"Baseline scaffold passes smoke cases.","tags":["evidence","baseline"]}},
        {"op":"append","path":"/scratch_knowledge/notes","value":{"id":"note-baseline-finding","content":"Implemented baseline and verified invariants.","tags":["finding","baseline"]}},
        {"op":"append","path":"/pointers/logs","value":{"ptr":"sha256:<log_ptr>","kind":"tool_log","title":"Baseline work log"}},
        {"op":"set","path":"/plan/sections/foundation/pointers","value":["note-baseline-finding","note-baseline-evidence"]}
      ]

controller:
  bucket: execution
  proposable: true
execution:
  kind: commit
  shape: linear
  actor_id: Researcher
  mcp_tools: true
