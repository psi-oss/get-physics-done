# Ground Action — Base Bundle
# Enhanced from hot-dag Ground.yaml with systematic literature review protocol,
# knowledge graph population, and cross-checking guidelines.

schema_version: 1
action_id: Ground
title: Ground
summary: |
  Ground research in evidence, knowledge, and literature. Performs literature
  review, extracts known facts, populates the knowledge graph, cross-checks
  state consistency, and retrieves cold-ledger artifacts into hot context.

schemas:
  state_fields_touched:
    - /scratch_knowledge
    - /pointers

write_set:
  allowed_write_prefixes:
    - /scratch_knowledge
    - /pointers

write_recipe:
  version: 1
  containers:
    - op: append
      path: /pointers/citations
      value_required_keys: [ptr, kind]
    - op: append
      path: /scratch_knowledge/notes
      value_required_keys: [id, content]
    - op: put
      path: /scratch_knowledge/key_values

parameters:
  required: []
  optional:
    - name: grounding_intent
      type: string|null
      meaning: What aspect needs grounding.
    - name: literature_query
      type: string|null
      meaning: Search query for external literature.
    - name: max_sources
      type: integer|null
      meaning: Maximum external sources to retrieve.
    - name: target_item_ids
      type: array[string]|null
      meaning: Knowledge item IDs to cross-check with new evidence.

triage_guidance: |
  Propose Ground when:
  - Beginning work on a new problem or direction
  - Critical claims need external literature support
  - Prior results from the ledger are needed for next steps
  - Current state may be inconsistent with established evidence
  - Knowledge graph needs population with established facts

  Ground is the ONLY action for literature search, citation, and ledger retrieval.

  Do NOT propose Ground when:
  - Work is purely local with no need for external validation
  - Adding notes without evidence backing (use Work or RefineKnowledge)

action_guidance: |
  ## Literature Review Protocol
  1. Search for relevant papers, documentation, and domain knowledge
  2. Prefer few high-quality sources over citation spam
  3. Store full sources as cold artifacts, add LedgerPointers under /pointers/citations
  4. Populate /scratch_knowledge/notes with findings as {id, content, tags} entries
  5. Use /scratch_knowledge/key_values for named facts (constants, definitions)

  ## Note Tags (use for categorization)
  - tags: assumption, definition, claim, finding, test, evidence, nogo, issue, decision
  - citation kind: paper | excerpt | web | tool_log | evaluation | code | dataset | plot | trace | review

  ## Cross-Checking
  If target_item_ids provided:
  - Review those notes against retrieved evidence
  - Add evidence notes to support correct claims
  - Add issue notes to flag contradictions

  ## Anti-Patterns
  - Long excerpts in note content (store cold, reference pointers)
  - Citations without connected knowledge notes
  - Over-retrieving irrelevant artifacts
  - Literature review without scratch knowledge population

examples:
  - name: Ground strategy with literature citation
    writes_example: |
      [
        {"op":"append","path":"/pointers/citations","value":{"ptr":"sha256:<paper_ptr>","kind":"paper","title":"Best practices for optimization","summary":"Established methodology review."}},
        {"op":"append","path":"/scratch_knowledge/notes","value":{"id":"note-evidence-lit-1","content":"Optimization requires careful baseline comparison (see citation sha256:<paper_ptr>).","tags":["evidence","literature"]}}
      ]

controller:
  bucket: repair
  proposable: true
execution:
  kind: commit
  shape: linear
  actor_id: Researcher
  mcp_tools: true
