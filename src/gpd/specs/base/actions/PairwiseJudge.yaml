# PairwiseJudge Action — Base Bundle
# Report-only: pairwise comparison for BT/Elo rating updates.

schema_version: 1
action_id: PairwiseJudge
title: Pairwise Judge
summary: |
  Compare two candidate nodes via DCA-based diff stacks.
  Produces a structured judgment that updates Bradley-Terry/Elo ratings.
  Report-only — no DAG commit, no state modification.

schemas:
  state_fields_touched: []

write_set:
  allowed_write_prefixes: []

parameters:
  required: []
  optional:
    - name: comparison_id
      type: string
      meaning: Tournament comparison id to execute (provided by the scheduler/queue, not by the triage policy).

triage_guidance: |
  NOT proposable. The scheduler injects PairwiseJudge comparisons
  based on the configured comparison strategy (compare_ancestors_k,
  same_depth_comparison, tournament queue).

report_guidance: |
  PairwiseJudge is a report action (no DAG commit; ledger-only). Any attempt to commit it should be rejected.

  Use this action to produce tournament comparisons and update soft-score signals via ratings.

controller:
  bucket: other
  proposable: false

execution:
  kind: report
  shape: comparison
  actor_id: PairwiseJudge

report:
  impl: agentic_builder.reporting:run_pairwise_judge_comparison_report
  effects:
    events:
      - kind: judge_completed
        payload_small:
          comparison_id:
            artifact_kind: pairwise_judge_summary
            pointer: /comparison_id
          p_u_gt_v:
            artifact_kind: pairwise_judge_summary
            pointer: /p_u_gt_v
            required: false
            default: null
          order_disagreement:
            artifact_kind: pairwise_judge_summary
            pointer: /order_disagreement
            required: false
            default: null
          artifact_ptr:
            artifact_kind: pairwise_judge_summary
            pointer: /judge_artifact_ptr
            required: false
            default: null
          model_config_label:
            artifact_kind: pairwise_judge_summary
            pointer: /model_config_label
            required: false
            default: null
      - kind: rating_updated
        payload_small:
          comparison_id:
            artifact_kind: pairwise_judge_summary
            pointer: /comparison_id
          rating_u:
            artifact_kind: pairwise_judge_summary
            pointer: /rating_u
          rating_v:
            artifact_kind: pairwise_judge_summary
            pointer: /rating_v
          delta_u:
            artifact_kind: pairwise_judge_summary
            pointer: /delta_u
            required: false
            default: null
          delta_v:
            artifact_kind: pairwise_judge_summary
            pointer: /delta_v
            required: false
            default: null
          comparison_type:
            artifact_kind: pairwise_judge_summary
            pointer: /comparison_type
