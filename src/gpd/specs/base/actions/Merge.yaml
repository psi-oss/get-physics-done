# Merge Action — Base Bundle
# Enhanced from hot-dag Merge.yaml with structured merge protocol.

schema_version: 1
action_id: Merge
title: Merge
summary: |
  Synthesize knowledge from two divergent branches into a unified state.
  Handles conflicting findings, complementary evidence, and plan reconciliation
  with explicit provenance tracking.

schemas:
  state_fields_touched:
    - /plan
    - /scratch_knowledge
    - /strategy
    - /pointers

write_set:
  allowed_write_prefixes:
    - /plan
    - /scratch_knowledge
    - /strategy
    - /pointers

write_recipe:
  version: 1
  containers:
    - op: put
      path: /scratch_knowledge/items
      key_field: item_id
      value_required_keys: [item_id, item_type, statement]
    - op: append
      path: /scratch_knowledge/edges
      value_required_keys: [src, rel, dst]

parameters:
  required: []
  optional:
    - name: merge_strategy_hint
      type: string|null
      meaning: Hint for preferred merge strategy (e.g., "prefer_branch_a", "synthesize", "take_best_results").

triage_guidance: |
  Propose Merge when:
  - Two or more branches have produced complementary knowledge
  - The merge scout identifies promising merge candidates
  - Branch results need consolidation for downstream evaluation

  Merge should be informed by:
  - Branch BT ratings (prefer merging high-rated branches)
  - Divergence distance from DCA (higher divergence = more potential value)
  - Complementarity of findings (not just overlap)

action_guidance: |
  ## Merge Protocol
  ### Phase 1: Diff Analysis
  - Identify DCA (divergence common ancestor)
  - Catalog changes per branch: added, modified, removed
  - Classify: compatible, complementary, or conflicting

  ### Phase 2: Conflict Resolution
  - Contradictory findings: keep stronger evidence, record alternative as Decision
  - Incompatible approaches: adopt the one with better results, document choice
  - Overlapping knowledge: merge into the more complete version
  - Plan divergence: prefer "done" > "in_progress" > "waiting"

  ### Phase 3: Synthesis
  - Apply compatible and complementary changes
  - Apply conflict resolutions
  - Update knowledge graph edges
  - Update plan summary
  - Record merge provenance in audit

  ## Quality Checks
  - No contradictory findings without Decision items
  - No orphaned items from either branch
  - Knowledge graph connected (no isolated subgraphs)
  - All pointer references valid in merged state

controller:
  bucket: maintenance
  proposable: true
execution:
  kind: commit
  shape: merge
  actor_id: Merger
