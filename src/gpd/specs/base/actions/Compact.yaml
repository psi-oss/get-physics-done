# Compact Action — Base Bundle
# Maintenance action: enforces state token budget via eviction/summarization.

schema_version: 1
action_id: Compact
title: Compact
summary: |
  Enforce the state token budget by evicting or summarizing low-value content.
  Evicted content is preserved in the cold ledger (never deleted).
  Scheduler-injected when state size approaches the token limit.

schemas:
  state_fields_touched:
    - /plan/sections
    - /scratch_knowledge
    - /pointers

write_set:
  allowed_write_prefixes:
    - /plan/sections
    - /scratch_knowledge
    - /pointers

write_recipe:
  version: 1
  containers:
    - op: put
      path: /plan/sections
      value_required_keys: [title, status, content, pointers, subsections]
    - op: append
      path: /scratch_knowledge/notes
      value_required_keys: [id, content]
    - op: put
      path: /scratch_knowledge/key_values
    - op: append
      path: /pointers/logs
      value_required_keys: [ptr, kind]

parameters:
  required:
    - name: target_token_count
      type: integer
      meaning: Target state size after compaction (tokens).
    - name: current_token_count
      type: integer
      meaning: Current state size before compaction (tokens).

triage_guidance: |
  NOT proposable. The scheduler injects Compact when state size exceeds
  the configured token limit (state_view_token_limit in config).

action_guidance: |
  ## Compaction Protocol
  1. **Inventory** all state sections by token cost (approximate via character count / 4)
  2. **Rank** by value: notes referenced by active plan nodes > findings > evidence > logs
  3. **Evict** lowest-value notes first:
     - Store full content in cold ledger via pointer
     - Replace in-state with a 1-line summary + pointer reference
  4. **Summarize** verbose sections:
     - Collapse completed plan sections to summary + pointers only
     - Merge duplicate scratch knowledge notes
     - Truncate long evidence to key findings + pointer to full version
  5. **Verify** final token count is below target

  ## Preservation Rules (NEVER evict)
  - Active plan nodes (status "waiting" or "in_progress")
  - Scratch knowledge notes referenced by active plan node pointers
  - NoGo notes (these prevent repeated failures)
  - Decision notes (these record critical choices)
  - The strategy section (/strategy)
  - The plan summary (/plan/summary)

  ## Cold Ledger References
  When evicting content, always:
  1. Store the full content as a cold ledger artifact
  2. Record the pointer (sha256:...) in /pointers/logs
  3. Replace the in-state note with: content + "[compacted -> sha256:...]"

controller:
  bucket: maintenance
  proposable: false
  is_compaction: true

execution:
  kind: commit
  shape: linear
  actor_id: Clerk
