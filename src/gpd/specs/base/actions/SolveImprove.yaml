# SolveImprove Action — Base Bundle
# Pipeline: Solve -> evaluate -> improve cycle.

schema_version: 1
action_id: SolveImprove
title: SolveImprove
summary: |
  Pipeline action: generate a candidate solution (Solve), evaluate it against
  the task verifier, then improve the state based on the evaluation feedback.
  Records findings and updates plan status based on evaluation results.

schemas:
  state_fields_touched:
    - /plan/sections
    - /scratch_knowledge
    - /pointers

write_set:
  allowed_write_prefixes:
    - /plan/sections
    - /scratch_knowledge
    - /pointers

write_recipe:
  version: 1
  containers:
    - op: append
      path: /scratch_knowledge/notes
      value_required_keys: [id, content]
    - op: put
      path: /scratch_knowledge/key_values
    - op: append
      path: /pointers/logs
      value_required_keys: [ptr, kind]

parameters:
  required: []
  optional:
    - name: max_attempts
      type: integer
      meaning: Maximum solve attempts before recording a NoGo.
    - name: target_score
      type: number|null
      meaning: Target score threshold for the solution to be considered successful.

triage_guidance: |
  Propose SolveImprove when:
  - The plan has progressed enough to attempt a solution
  - Prior solutions need iterative improvement based on verifier feedback
  - A new approach should be tested against the verifier

action_guidance: |
  ## Pipeline Flow
  1. Solver generates candidate solution
  2. Task verifier evaluates deterministically (score 0-100)
  3. Based on evaluation:
     - score >= target: record as finding note (verified), update plan status
     - score > 0 but < target: record partial progress, identify improvement areas
     - score == 0: analyze failure, record issue or nogo note, adjust approach

  ## State Updates
  - Record evaluation results as notes in /scratch_knowledge/notes with score in content
  - Store score in /scratch_knowledge/key_values for tracking
  - Link evaluation to relevant plan nodes via pointers
  - If solution passes, mark relevant plan nodes as "done"
  - If solution fails, add issue notes describing what went wrong
  - After repeated failures (>= max_attempts), record as nogo note

controller:
  bucket: execution
  proposable: true

execution:
  kind: commit
  shape: pipeline
  actor_id: Clerk
pipeline:
  pre_steps:
    - action_id: Solve
      step_type: solve
      kwargs: {}
      aux_write_scope: child
  attachments:
    - kind: execution_trace
      name: execution_trace
      ptr_artifact_kind: model_call_record
      data_fields:
        execution_trace:
          artifact_kind: model_call_record
          pointer: /execution_trace
      constraints:
        - authoritative ledger pointer; do not fabricate
    - kind: evaluation_result
      name: evaluation_result
      ptr_artifact_kind: evaluation_result
      data_from_artifact_kind: evaluation_result
      constraints:
        - authoritative ledger pointer; do not fabricate
  required_attachment_kinds:
    - execution_trace
    - evaluation_result
  required_artifact_kinds:
    - evaluation_result
    - work_attempt_record
    - solve_attempt_trace
