# Plan Action — Base Bundle
# Enhanced from hot-dag Plan.yaml with deeper decomposition guidance,
# checkpoint placement, and dependency tracking.

schema_version: 1
action_id: Plan
title: Plan
summary: |
  Create or refine the research plan under /plan.
  Bias toward explicit decomposition: use all 4 layers (phases -> sections -> subsections -> checkpoints)
  so leaf nodes are immediately executable. Include validation checkpoints where helpful.

schemas:
  state_fields_touched:
    - /plan
    - /plan/summary
    - /pending_todos

write_set:
  allowed_write_prefixes:
    - /plan
    - /pending_todos

write_recipe:
  version: 1
  containers:
    - op: put
      path: /plan/sections
      value_required_keys: [title, status, content, pointers, subsections]
    - op: append
      path: /pending_todos
      value_required_keys: [id, task, priority]
  notes:
    - For nested nodes, use put(path="<...>/subsections", key="<id>", value=<PlanNode with subsections:{}>).

parameters:
  required: []
  optional:
    - name: planning_intent
      type: string|null
      meaning: What aspect of planning is being addressed (e.g., "initial outline", "refactor sections", "status update").

triage_guidance: |
  Propose Plan when:
  - /plan is empty or not actionable
  - Plan structure needs restructuring based on new knowledge
  - Multiple work threads need clearer ordering or grouping
  - Plan needs deeper breakdown to make next steps concrete
  - Significant fraction of plan nodes have been completed since last refresh

action_guidance: |
  ## Plan Structure
  - /plan/sections is a map: { "<section_id>": <PlanNode>, ... }
  - Each PlanNode has: title, status, content, pointers, subsections
  - Depth convention: phases -> sections -> subsections -> checkpoints
  - For non-trivial work, use 3-4 layers so leaf nodes are concrete

  ## Decomposition Guidelines
  - Each leaf node should be completable in a single Work action
  - Include validation checkpoints between major phases
  - Note dependencies explicitly in content (what must complete before this starts)
  - If steps are uncertain, include them as placeholders noting what must be learned
  - Prefer stable IDs (snake_case or kebab-case) for map keys
  - Capture remaining tasks in /pending_todos with priority for tracking

  ## Plan Quality Criteria
  - Every plan node has a clear, actionable title
  - Leaf nodes are concrete enough to execute without interpretation
  - Dependencies between nodes are documented
  - Validation checkpoints exist between major phases
  - No circular dependencies

  ## Write Guidelines
  - Prefer adding nodes via put at explicit paths (keep each value shallow)
  - Keep /plan/summary updated as <= 5 sentence synopsis
  - Do NOT mark items "done" without non-empty pointers referencing /scratch_knowledge items
  - This action cannot write /scratch_knowledge; leave status as waiting if no evidence exists yet

modes:
  initial:
    title: "Plan/initial"
    summary: "Create initial plan outline from scratch"
    triage_guidance: "Propose when /plan is empty or needs full restructuring."
    action_guidance: "Create a comprehensive 3-4 layer plan decomposition."
  refine:
    title: "Plan/refine"
    summary: "Refine and restructure existing plan"
    triage_guidance: "Propose when plan needs partial restructuring or deeper breakdown."
    action_guidance: "Preserve working structure, refine sections that need improvement."
  status_update:
    title: "Plan/status_update"
    summary: "Update plan node statuses based on progress"
    triage_guidance: "Propose when plan statuses are stale and need updating."
    action_guidance: "Update statuses and pointers; do not restructure the plan."

examples:
  - name: Create a 4-layer plan outline
    writes_example: |
      [
        {"op":"put","path":"/plan/sections","key":"foundation","value":{"title":"Phase: Foundation","status":"waiting","content":"Make prerequisites explicit and verifiable.","pointers":[],"subsections":{}}},
        {"op":"put","path":"/plan/sections/foundation/subsections","key":"baseline","value":{"title":"Section: Baseline","status":"waiting","content":"Establish baseline and measurement harness.","pointers":[],"subsections":{}}},
        {"op":"put","path":"/plan/sections/foundation/subsections/baseline/subsections","key":"data_contract","value":{"title":"Subsection: Data contract","status":"waiting","content":"Define inputs/outputs and invariants.","pointers":[],"subsections":{}}},
        {"op":"set","path":"/plan/summary","value":"Foundation -> Implementation plan with concrete checkpoints."}
      ]

controller:
  bucket: maintenance
  proposable: true
execution:
  kind: commit
  shape: linear
  actor_id: Researcher
