# Critique Action — Base Bundle
# Enhanced from hot-dag Critique.yaml with structured rubric and severity classification.

schema_version: 1
action_id: Critique
title: Critique (report-only)
summary: |
  Audit-only critique report (ledger-only):
  - Critic audits the current node's state for inconsistencies and missing dependencies
  - Writes a critique_report artifact to the cold ledger
  - Returns a critique_report attachment for downstream pipeline commits (e.g., CritiqueImprove)
  This action does NOT commit and does NOT create a DAG node.

schemas:
  state_fields_touched: []

write_set:
  allowed_write_prefixes: []

parameters:
  required: []
  optional:
    - name: max_issues_K
      type: integer
      meaning: Maximum number of issues to surface in the critique report.
    - name: max_chars
      type: integer
      meaning: Maximum characters in the critique_report attachment excerpt.

triage_guidance: |
  Do NOT propose Critique. It is invoked by the system as a report action for pipeline pre-steps.

report_guidance: |
  Critique is a report action (no DAG commit; ledger-only).

  ## Critique Rubric
  Evaluate against these dimensions:
  1. **Logical Consistency** — contradictions, unsupported claims, broken edges
  2. **Completeness** — orphaned items, "done" without pointers, missing dependencies
  3. **Quality** — vague findings, unverifiable claims, unstated assumptions
  4. **Progress Alignment** — work advancing strategy/plan, stalled nodes

  ## Severity Classification
  - critical: blocks progress or invalidates prior work
  - major: significantly degrades quality
  - minor: cosmetic or organizational
  - note: observation or suggestion

  ## Output Format
  Each issue: what (description), where (JSON path), why (impact), fix (concrete step).

controller:
  bucket: other
  proposable: false
execution:
  kind: report
  shape: node
  actor_id: Critic
