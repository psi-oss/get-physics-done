# Solve Action — Base Bundle
# Enhanced from hot-dag Solve.yaml with prior-awareness and failure avoidance.

schema_version: 1
action_id: Solve
title: Solve
summary: |
  Generate a candidate solution for deterministic evaluation by the task verifier.
  Output ONLY the solution in the exact format required — no analysis, no markdown.
  Prior-aware: builds on best attempts and avoids documented failures.

schemas:
  state_fields_touched: []

write_set:
  allowed_write_prefixes: []

parameters:
  required: []
  optional:
    - name: approach_hint
      type: string|null
      meaning: Suggested approach or variation to try for this solution attempt.

triage_guidance: |
  Do NOT propose Solve directly. It is invoked by the system as a report action
  for evaluation pipelines (SolveImprove, standalone evaluation).

report_guidance: |
  ## Solution Protocol
  1. Read task statement — understand exact format required
  2. Study current state: /strategy, /plan, /scratch_knowledge
  3. Avoid known failures: check NoGo items and documented dead ends
  4. Build on prior work: use best attempts and promising directions
  5. Verify format compliance before outputting

  ## Output
  - ONLY the solution as a single JSON object
  - No markdown, no analysis, no extra keys, no surrounding text
  - Wrong format = score 0

  ## Failure Avoidance
  - If all prior attempts scored 0, try a fundamentally different approach
  - If prior attempts scored > 0 but < threshold, analyze what was close and improve
  - Never repeat an approach documented as NoGo

controller:
  bucket: other
  proposable: false

execution:
  kind: report
  shape: node
  actor_id: Solver
  mcp_tools: true

report:
  impl: agentic_builder.reporting:run_solve_report
  effects:
    aux_writes:
      - target: node_record
        fields:
          hard_status:
            artifact_kind: evaluation_result
            pointer: /status
          hard_score:
            artifact_kind: evaluation_result
            pointer: /score
          hard_result_ptr:
            artifact_kind: evaluation_result
            ptr: true
          hard_score_inherited: false
    events:
      - kind: solve_attempt_completed
        payload_small:
          trigger:
            var: trigger
          trigger_details:
            var: trigger_details
            required: false
            default: null
          attempt_id:
            artifact_kind: solve_attempt_trace
            pointer: /attempt_id
          pass_threshold:
            artifact_kind: evaluation_result
            pointer: /meta/pass_threshold
            required: false
            default: null
          solver_attempt_row_ptr:
            artifact_kind: solver_attempt_row
            ptr: true
          candidate_output_ptr:
            artifact_kind: candidate_output
            ptr: true
          evaluation_result_ptr:
            artifact_kind: evaluation_result
            ptr: true
          attempt_record_ptr:
            artifact_kind: work_attempt_record
            ptr: true
          solve_attempt_trace_ptr:
            artifact_kind: solve_attempt_trace
            ptr: true
          solver_model_id:
            artifact_kind: solve_attempt_trace
            pointer: /solver_model_id
            required: false
            default: null
          solver_display_model_id:
            artifact_kind: solve_attempt_trace
            pointer: /solver_display_model_id
            required: false
            default: null
          solver_model_config_hash:
            artifact_kind: solve_attempt_trace
            pointer: /solver_model_config_hash
            required: false
            default: null
          eval:
            run_id:
              artifact_kind: solve_attempt_trace
              pointer: /evaluation_summary/run_id
            status:
              artifact_kind: solve_attempt_trace
              pointer: /evaluation_summary/status
            score:
              artifact_kind: solve_attempt_trace
              pointer: /evaluation_summary/score
            duration_ms:
              artifact_kind: solve_attempt_trace
              pointer: /evaluation_summary/duration_ms
            result_ptr:
              artifact_kind: solve_attempt_trace
              pointer: /evaluation_summary/result_ptr
