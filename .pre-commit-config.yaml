repos:
  - repo: local
    hooks:
      - id: block-gpd-directory
        name: prevent GPD/ files from entering the repo
        entry: scripts/block-gpd-commit.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: ruff-check-unsafe-fixes
        name: ruff check --fix --unsafe-fixes
        entry: uv run ruff check --fix --unsafe-fixes
        language: system
        require_serial: true
        types_or:
          - python
          - pyi
