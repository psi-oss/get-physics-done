[project]
name = "get-physics-done"
version = "0.1.0"
description = "GPD — Get Physics Done: autonomous physics research orchestration"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [
    { name = "Sergio Hernandez-Cuenca" },
]
classifiers = [
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    # Core
    "typer>=0.21.1",
    "rich>=13.7.1",
    "pydantic>=2.0",
    "PyYAML>=6.0",
    "tenacity>=9.0",
    "logfire>=1.0",
    # LLM / Agent
    "pydantic-ai-slim[anthropic,retries]>=1.66.0",
    "claude-agent-sdk>=0.1.19",
    "mcp[cli]>=1.9.0",
    # Utilities
    "pybtex>=0.24",
    "Pillow>=10.0",
    "jinja2>=3.1",
    # Unified CLI surfaces
    "fastapi>=0.100",
    "uvicorn[standard]>=0.20",
    "sse-starlette>=1.6",
    "httpx>=0.27",
]

[project.optional-dependencies]
scientific = [
    "numpy>=1.26.0",
    "scipy>=1.12.0",
]

[project.scripts]
gpd = "gpd.cli:app"
"gpd-mcp-conventions" = "gpd.mcp.servers.conventions_server:main"
"gpd-mcp-verification" = "gpd.mcp.servers.verification_server:main"
"gpd-mcp-protocols" = "gpd.mcp.servers.protocols_server:main"
"gpd-mcp-errors" = "gpd.mcp.servers.errors_mcp:main"
"gpd-mcp-patterns" = "gpd.mcp.servers.patterns_server:main"
"gpd-mcp-state" = "gpd.mcp.servers.state_server:main"
"gpd-mcp-skills" = "gpd.mcp.servers.skills_server:main"

[project.urls]
Homepage = "https://github.com/physicalsuperintelligence/get-physics-done"
Documentation = "https://github.com/physicalsuperintelligence/get-physics-done/blob/main/docs/USER-GUIDE.md"
Repository = "https://github.com/physicalsuperintelligence/get-physics-done"
Issues = "https://github.com/physicalsuperintelligence/get-physics-done/issues"
Security = "mailto:security@getphysicsdone.com"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gpd"]

[tool.logfire]
ignore_no_config = true

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests requiring external services (database, etc.)",
]
filterwarnings = [
    "ignore::logfire._internal.config.LogfireNotConfiguredWarning",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "TID251"]
ignore = ["E501", "B008"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"typing.Any".msg = "Use `object` instead of `Any` for top types."

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
