# GPD update notification
notify = ["/Users/sergio/.gpd/venv/bin/python", ".codex/hooks/notify.py"]

[features]
# GPD multi-agent support
multi_agent = true
# GPD MCP servers

[mcp_servers.gpd-arxiv]
command = "/Users/sergio/.gpd/venv/bin/python"
args = ["-m", "arxiv_mcp_server"]

[mcp_servers.gpd-conventions]
command = "/Users/sergio/.gpd/venv/bin/python"
args = ["-m", "gpd.mcp.servers.conventions_server"]

[mcp_servers.gpd-conventions.env]
LOG_LEVEL = "WARNING"

[mcp_servers.gpd-errors]
